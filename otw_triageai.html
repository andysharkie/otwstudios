<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OTW TriageAI — Smart Email Triage for Trade Businesses | OTW Studios</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg0: #F2F5FA;
  --bg1: #FFFFFF;
  --bg2: #FFFFFF;
  --bg3: #EEF2F8;
  --bg4: #E4EAF5;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.12);
  --gold: #F59E0B;
  --gold-dim: rgba(245,158,11,0.10);
  --gold-border: rgba(245,158,11,0.32);
  --gold-text: #B45309;
  --red: #EF4444;
  --red-dim: rgba(239,68,68,0.08);
  --red-border: rgba(239,68,68,0.22);
  --green: #22C55E;
  --green-dim: rgba(34,197,94,0.08);
  --t1: #0F172A;
  --t2: rgba(15,23,42,0.58);
  --t3: rgba(15,23,42,0.36);
  --t4: rgba(15,23,42,0.18);
}
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg0); color: var(--t1); font-size: 14px; line-height: 1.5; }
button { font-family: inherit; cursor: pointer; }
textarea, input, select { font-family: inherit; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }

/* ─── LAYOUT ─────────────────────────────────── */
.app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.app-main { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 204px; min-width: 204px; background: var(--bg1); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; box-shadow: 1px 0 0 rgba(0,0,0,0.04); }
.main-content { flex: 1; display: flex; overflow: hidden; }
.triage-view { flex: 1; display: flex; overflow: hidden; }
.app-footer { flex-shrink: 0; padding: 7px 20px; background: var(--bg1); border-top: 1px solid var(--border); text-align: center; font-size: 10px; font-weight: 500; letter-spacing: 0.07em; color: rgba(15,23,42,0.25); }

/* ─── SIDEBAR ────────────────────────────────── */
.sb-logo { padding: 18px 16px 14px; border-bottom: 1px solid var(--border); }
.sb-logo-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.sb-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); flex-shrink: 0; box-shadow: 0 0 6px rgba(245,158,11,0.5); }
.sb-name { font-size: 14px; font-weight: 800; letter-spacing: -0.02em; color: var(--t1); }
.sb-product { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.14em; color: var(--gold); padding-left: 16px; margin-bottom: 8px; }
.demo-badge { display: flex; align-items: center; gap: 6px; background: var(--gold-dim); border: 1px solid var(--gold-border); border-radius: 6px; padding: 6px 10px; margin: 12px 16px 0; }
.demo-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); animation: pulse 2s infinite; }
.demo-text { font-size: 10px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 0.08em; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.sb-nav { flex: 1; padding: 12px 8px; overflow-y: auto; }
.sb-section { margin-bottom: 20px; }
.sb-section-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--t4); padding: 0 8px; margin-bottom: 4px; }
.nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 8px; cursor: pointer; transition: all 0.15s; position: relative; border: 1px solid transparent; }
.nav-item:hover { background: rgba(255,255,255,0.04); }
.nav-item.active { background: var(--gold-dim); border-color: var(--gold-border); }
.nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
.nav-label { font-size: 13px; font-weight: 500; color: var(--t2); flex: 1; }
.nav-item.active .nav-label { color: var(--gold); font-weight: 600; }
.nav-badge { min-width: 18px; height: 18px; border-radius: 9px; background: var(--red); color: #fff; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; padding: 0 5px; }
.nav-badge.gold { background: var(--gold); color: var(--bg0); }

.sb-profile { padding: 12px 14px; border-top: 1px solid var(--border); }
.sb-profile-name { font-size: 12px; font-weight: 700; color: var(--t1); margin-bottom: 2px; }
.sb-profile-sub { font-size: 10px; color: var(--t3); }
.connection-pill { display: inline-flex; align-items: center; gap: 4px; background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.25); border-radius: 10px; padding: 2px 7px; font-size: 9px; font-weight: 700; color: #16A34A; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 5px; }

/* ─── EMAIL LIST ─────────────────────────────── */
.email-list-pane { width: 304px; min-width: 304px; background: var(--bg1); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; box-shadow: 1px 0 0 rgba(0,0,0,0.04); }
.list-header { padding: 16px 16px 0; flex-shrink: 0; }
.list-title { font-size: 16px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 12px; }
.filter-row { display: flex; gap: 4px; padding-bottom: 12px; border-bottom: 1px solid var(--border); overflow-x: auto; }
.filter-pill { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid var(--border2); background: transparent; color: var(--t3); white-space: nowrap; transition: all 0.15s; }
.filter-pill:hover { color: var(--t2); border-color: var(--border2); }
.filter-pill.active { background: var(--gold-dim); border-color: var(--gold-border); color: var(--gold); }
.filter-pill.urgent.active { background: var(--red-dim); border-color: var(--red-border); color: var(--red); }

.email-list { flex: 1; overflow-y: auto; }
.email-row { padding: 12px 14px 12px 12px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.1s; display: flex; gap: 10px; align-items: flex-start; position: relative; }
.email-row:hover { background: var(--bg3); }
.email-row.selected { background: var(--bg4); }
.email-row.selected::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background: var(--gold); }
.email-unread-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
.email-unread-dot.urgent { background: var(--red); }
.email-unread-dot.work { background: var(--gold); }
.email-unread-dot.inbox { background: var(--t4); }
.email-unread-dot.read { background: transparent; }
.email-row-main { flex: 1; min-width: 0; }
.email-row-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
.email-sender { font-size: 13px; font-weight: 600; color: var(--t1); truncate: true; }
.email-row.read .email-sender { font-weight: 500; color: var(--t2); }
.email-time { font-size: 10px; color: var(--t3); white-space: nowrap; margin-left: 8px; }
.email-subject { font-size: 12px; color: var(--t2); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.email-row.selected .email-subject { color: var(--t1); }
.email-preview { font-size: 11px; color: var(--t3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cat-pill { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; margin-top: 4px; }
.cat-pill.urgent { background: var(--red-dim); color: var(--red); border: 1px solid var(--red-border); }
.cat-pill.work { background: var(--gold-dim); color: var(--gold); border: 1px solid var(--gold-border); }
.cat-pill.inbox { background: rgba(255,255,255,0.04); color: var(--t3); border: 1px solid var(--border); }
.approved-check { font-size: 10px; font-weight: 700; color: var(--green); background: var(--green-dim); border: 1px solid rgba(34,197,94,0.2); padding: 1px 6px; border-radius: 8px; margin-top: 4px; display: inline-block; }

/* ─── DETAIL PANE ────────────────────────────── */
.detail-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg0); border-left: 1px solid var(--border); }
.detail-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
.empty-icon { font-size: 36px; opacity: 0.2; }
.empty-text { font-size: 13px; color: var(--t3); text-align: center; line-height: 1.7; }

.detail-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg1); }
.detail-tab { padding: 13px 20px; font-size: 12px; font-weight: 600; color: var(--t3); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; transition: all 0.15s; }
.detail-tab:hover { color: var(--t2); }
.detail-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

.detail-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

/* Email header */
.email-header { padding: 22px 28px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.email-header-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
.email-subject-big { font-size: 17px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.3; flex: 1; padding-right: 16px; }
.cat-pill-big { padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; flex-shrink: 0; }
.cat-pill-big.urgent { background: var(--red-dim); color: var(--red); border: 1px solid var(--red-border); }
.cat-pill-big.work { background: var(--gold-dim); color: var(--gold); border: 1px solid var(--gold-border); }
.cat-pill-big.inbox { background: rgba(255,255,255,0.04); color: var(--t2); border: 1px solid var(--border2); }
.sender-row { display: flex; align-items: center; gap: 10px; }
.sender-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.sender-info { flex: 1; }
.sender-name { font-size: 13px; font-weight: 600; color: var(--t1); }
.sender-email { font-size: 11px; color: var(--t3); }
.email-date { font-size: 11px; color: var(--t3); margin-left: auto; }

/* Email body */
.email-body { padding: 22px 28px; flex-shrink: 0; border-bottom: 1px solid var(--border); }
.email-body-text { font-size: 14px; line-height: 1.8; color: var(--t2); white-space: pre-wrap; }

/* ─── AI DRAFT PANEL ─────────────────────────── */
.draft-panel { padding: 22px 28px 28px; }
.draft-eyebrow { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.draft-eyebrow-label { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.14em; color: var(--gold); }
.draft-divider-line { flex: 1; height: 1px; background: var(--gold-border); }
.learning-indicator { display: flex; align-items: center; gap: 5px; background: var(--gold-dim); border: 1px solid var(--gold-border); border-radius: 10px; padding: 3px 8px; font-size: 10px; font-weight: 600; color: var(--gold); }
.learning-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold); }

.draft-text { width: 100%; background: var(--bg0); border: 1px solid var(--border2); border-radius: 10px; padding: 16px; font-size: 13px; line-height: 1.85; color: var(--t2); resize: none; min-height: 200px; outline: none; transition: border-color 0.2s; }
.draft-text:focus { border-color: var(--gold-border); background: rgba(245,158,11,0.03); color: var(--t1); }
.draft-text[readonly] { cursor: default; }

.draft-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
.btn-approve { padding: 10px 22px; border-radius: 50px; background: var(--gold); border: none; color: #04080F; font-size: 13px; font-weight: 800; transition: all 0.15s; letter-spacing: 0.01em; }
.btn-approve:hover { background: #FBBF24; transform: translateY(-1px); }
.btn-approve.sent { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,0.3); cursor: default; transform: none; }
.btn-ghost { padding: 10px 18px; border-radius: 50px; background: transparent; border: 1px solid var(--border2); color: var(--t2); font-size: 13px; font-weight: 600; transition: all 0.15s; }
.btn-ghost:hover { border-color: var(--border2); color: var(--t1); background: rgba(255,255,255,0.04); }
.btn-teach { padding: 10px 18px; border-radius: 50px; background: var(--gold-dim); border: 1px solid var(--gold-border); color: var(--gold); font-size: 13px; font-weight: 700; transition: all 0.15s; }
.btn-teach:hover { background: rgba(245,158,11,0.18); }
.regen-spin { display: inline-block; animation: spin 0.6s linear; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

.sent-banner { background: var(--green-dim); border: 1px solid rgba(34,197,94,0.2); border-radius: 10px; padding: 14px 18px; display: flex; align-items: center; gap: 10px; }
.sent-banner-icon { font-size: 18px; }
.sent-banner-text { font-size: 13px; font-weight: 600; color: var(--green); }
.sent-banner-sub { font-size: 11px; color: rgba(22,163,74,0.7); margin-top: 2px; }

/* ─── INVOICE PANEL ──────────────────────────── */
.invoice-wrap { padding: 22px 28px 32px; }
.invoice-card { background: #fff; border-radius: 12px; overflow: hidden; color: #111; }
.inv-header { background: #0A0F1E; padding: 24px 28px; display: flex; justify-content: space-between; align-items: flex-start; }
.inv-logo-name { font-size: 15px; font-weight: 800; color: #fff; letter-spacing: -0.02em; }
.inv-logo-sub { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 2px; }
.inv-title-block { text-align: right; }
.inv-title { font-size: 22px; font-weight: 900; color: #F59E0B; letter-spacing: -0.03em; }
.inv-num { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
.inv-body { padding: 24px 28px; }
.inv-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.inv-meta-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #999; margin-bottom: 4px; }
.inv-meta-val { font-size: 13px; font-weight: 600; color: #111; }
.inv-meta-val-sub { font-size: 11px; color: #666; margin-top: 1px; }
.inv-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
.inv-table th { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #999; padding: 8px 0; border-bottom: 2px solid #F1F1F1; text-align: left; }
.inv-table th:last-child { text-align: right; }
.inv-table td { padding: 11px 0; border-bottom: 1px solid #F5F5F5; font-size: 13px; color: #333; vertical-align: top; }
.inv-table td:last-child { text-align: right; font-weight: 600; }
.inv-totals { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.inv-total-row { display: flex; gap: 24px; font-size: 13px; }
.inv-total-label { color: #666; }
.inv-total-val { font-weight: 600; color: #333; min-width: 80px; text-align: right; }
.inv-total-row.grand { border-top: 2px solid #111; padding-top: 8px; margin-top: 4px; }
.inv-total-row.grand .inv-total-label { font-weight: 800; color: #111; font-size: 15px; }
.inv-total-row.grand .inv-total-val { font-weight: 900; color: #F59E0B; font-size: 15px; }
.inv-footer { background: #F9FAFB; padding: 14px 28px; font-size: 11px; color: #999; display: flex; justify-content: space-between; align-items: center; }
.inv-actions { display: flex; gap: 8px; margin-top: 16px; }
.btn-inv-approve { padding: 10px 22px; border-radius: 50px; background: #F59E0B; border: none; color: #04080F; font-size: 13px; font-weight: 800; cursor: pointer; transition: all 0.15s; }
.btn-inv-approve:hover { background: #FBBF24; }
.btn-inv-ghost { padding: 10px 18px; border-radius: 50px; background: transparent; border: 1px solid rgba(0,0,0,0.15); color: #555; font-size: 13px; font-weight: 600; cursor: pointer; }

/* ─── FULL VIEWS ─────────────────────────────── */
.full-view { flex: 1; overflow-y: auto; padding: 32px; }
.view-header { margin-bottom: 28px; }
.view-eyebrow { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.14em; color: var(--gold); margin-bottom: 6px; }
.view-title { font-size: 22px; font-weight: 900; letter-spacing: -0.03em; margin-bottom: 4px; }
.view-desc { font-size: 13px; color: var(--t3); line-height: 1.7; }

/* Learning view */
.learning-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; margin-bottom: 12px; }
.lc-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
.lc-rule { font-size: 14px; font-weight: 600; color: var(--t1); line-height: 1.5; flex: 1; padding-right: 16px; }
.lc-applied { font-size: 11px; color: var(--gold); font-weight: 600; background: var(--gold-dim); border: 1px solid var(--gold-border); padding: 3px 8px; border-radius: 8px; white-space: nowrap; }
.lc-meta { font-size: 11px; color: var(--t3); }
.lc-source { color: var(--t2); font-style: italic; }
.new-learning-banner { background: var(--gold-dim); border: 1px solid var(--gold-border); border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; animation: fadeIn 0.4s; }
@keyframes fadeIn { from{opacity:0; transform:translateY(-6px)} to{opacity:1; transform:translateY(0)} }
.nlb-text { font-size: 13px; font-weight: 600; color: var(--gold); }

/* ─── LIVE DEMO ANIMATIONS ───────────────────── */
@keyframes emailSlideIn { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:translateY(0)} }
.email-arriving { animation: emailSlideIn 0.45s cubic-bezier(.34,1.56,.64,1) forwards; }
@keyframes aiScan { 0%{left:-80%;opacity:0} 15%{opacity:1} 85%{opacity:1} 100%{left:180%;opacity:0} }
.ai-scan-line { position:absolute; bottom:0; left:0; right:0; height:1px; overflow:hidden; pointer-events:none; }
.ai-scan-line::after { content:''; position:absolute; top:0; width:50%; height:100%; background:linear-gradient(90deg,transparent,var(--gold),transparent); animation:aiScan 1.3s ease-in-out infinite; }
@keyframes dotBounce { 0%,100%{opacity:0.25;transform:scale(0.8)} 50%{opacity:1;transform:scale(1)} }
.ai-dot { display:inline-block; width:4px; height:4px; border-radius:50%; background:var(--gold); animation:dotBounce 1s ease-in-out infinite; }
.ai-dot:nth-child(2){animation-delay:.18s} .ai-dot:nth-child(3){animation-delay:.36s}
.cursor-blink { display:inline-block; width:2px; height:13px; background:var(--gold); animation:cursorBlink 0.65s step-end infinite; vertical-align:text-bottom; margin-left:1px; }
@keyframes cursorBlink { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes toastIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
.live-toast { position:fixed; top:20px; right:20px; background:#0F172A; border:1px solid rgba(245,158,11,0.45); border-radius:12px; padding:11px 18px; display:flex; align-items:center; gap:10px; z-index:300; box-shadow:0 8px 32px rgba(0,0,0,0.18); animation:toastIn 0.35s cubic-bezier(.34,1.56,.64,1); }
.toast-pulse { width:8px; height:8px; border-radius:50%; background:var(--gold); box-shadow:0 0 10px var(--gold); animation:pulse 1s ease-in-out infinite; }
.toast-text { font-size:12px; font-weight:700; color:var(--gold); }
@keyframes approvePulse { 0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,0)} 50%{box-shadow:0 0 0 8px rgba(245,158,11,0.25)} }
.approve-pulse { animation:approvePulse 1.2s ease-in-out infinite; }

/* Settings view */
.settings-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 20px; }
.settings-card-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--t3); margin-bottom: 18px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--t3); margin-bottom: 7px; }
.field input, .field textarea, .field select { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border2); border-radius: 9px; padding: 10px 13px; font-size: 13px; color: var(--t1); outline: none; transition: border-color 0.2s; }
.field input:focus, .field textarea:focus { border-color: var(--gold-border); background: rgba(245,158,11,0.03); }
.field input::placeholder, .field textarea::placeholder { color: var(--t4); }
.field textarea { resize: vertical; min-height: 72px; }
.settings-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.btn-save { padding: 11px 26px; border-radius: 50px; background: var(--gold); border: none; color: #04080F; font-size: 13px; font-weight: 800; cursor: pointer; transition: all 0.15s; }
.btn-save:hover { background: #FBBF24; }

/* Drafts view table */
.drafts-table { width: 100%; }

function DraftPanel({ email, onApprove, onLearn, approved, learningCount, typingDraft, isTypingDraft, draftReady }) {
  const [editing, setEditing] = useState(false);
  const [text, setText] = useState(email.draft);
  const [regen, setRegen] = useState(false);
  const isLiveDraft = (isTypingDraft || draftReady) && email.id === 11;

  const handleRegen = () => {
    setRegen(true);
    setTimeout(() => { setText(email.draft); setRegen(false); }, 900);
  };

  const handleSaveLearn = () => {
    onLearn(email, text);
    setEditing(false);
  };

  if (approved) {
    return (
      <div className="draft-panel">
        <div className="draft-eyebrow">
          <span className="draft-eyebrow-label">AI Draft</span>
          <div className="draft-divider-line"/>
        </div>
        <div className="sent-banner">
          <span className="sent-banner-icon">✅</span>
          <div>
            <div className="sent-banner-text">Reply sent to {email.from}</div>
            <div className="sent-banner-sub">Draft approved and sent via Gmail · {email.time}</div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="draft-panel">
      <div className="draft-eyebrow">
        <span className="draft-eyebrow-label">{isTypingDraft && email.id===11 ? 'AI Drafting Reply…' : 'AI Draft'}</span>
        <div className="draft-divider-line"/>
        {isTypingDraft && email.id===11
          ? <span style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:9,fontWeight:700,color:'var(--gold)',textTransform:'uppercase',letterSpacing:'0.08em'}}>
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10"/></svg>
              Writing <span className="ai-dot"/> <span className="ai-dot"/> <span className="ai-dot"/>
            </span>
          : <div className="learning-indicator">
              <span className="learning-dot"/><span className="learning-dot" style={{opacity:0.5}}/><span className="learning-dot" style={{opacity:0.25}}/>
              &nbsp;{learningCount} adaptations applied
            </div>
        }
      </div>

      {isLiveDraft
        ? <div className="draft-text" style={{whiteSpace:'pre-wrap',overflowY:'auto',minHeight:200,cursor:'default',position:'relative'}}>
            {isTypingDraft ? typingDraft : text}
            {isTypingDraft && <span className="cursor-blink"/>}
          </div>
        : <textarea
            className="draft-text"
            value={regen ? '✦  Rewriting draft...' : text}
            onChange={e => setText(e.target.value)}
            readOnly={!editing || regen}
            rows={10}
            style={regen ? {color:'var(--t3)',fontStyle:'italic'} : {}}
          />
      }

      <div className="draft-actions">
        {isTypingDraft && email.id===11
          ? <button className="btn-approve" style={{opacity:0.4,cursor:'not-allowed'}} disabled>✓ Approve & Send</button>
          : !editing ? (
          <>
            <button className={`btn-approve ${draftReady && email.id===11 ? 'approve-pulse' : ''}`} onClick={() => onApprove(email.id)}>✓ Approve & Send</button>
            <button className="btn-ghost" onClick={() => setEditing(true)}>✏ Edit Draft</button>
            <button className="btn-ghost" onClick={handleRegen}>
              <span className={regen ? 'regen-spin' : ''}>↺</span> Regenerate
            </button>
          </>
        ) : (
          <>
            <button className="btn-teach" onClick={handleSaveLearn}>⚡ Save + Teach AI</button>

            <button className="btn-ghost" onClick={() => { setEditing(false); setText(email.draft); }}>Cancel</button>
          </>
        )}
      </div>

      {editing && (
        <p style={{fontSize:11,color:'var(--t3)',marginTop:10,lineHeight:1.7}}>
          💡 After saving, the AI will learn from your changes and apply them to future drafts like this one.
        </p>
      )}
    </div>
  );
}

        {tab === 'invoice' && email.hasInvoice && (
          <InvoicePanel email={email} onApprove={() => onApproveInvoice(email.id)} approved={invApproved}/>

}

/* ════════════════════════════════════════════════
   APP ROOT
════════════════════════════════════════════════ */
function App() {
  const [view, setView] = useState('triage');
  const [selectedId, setSelectedId] = useState(null);
  const [filter, setFilter] = useState('all');
  const [approvedIds, setApprovedIds] = useState(new Set());
  const [approvedInvoices, setApprovedInvoices] = useState(new Set());
  const [learningHistory, setLearningHistory] = useState(INITIAL_LEARNING);
  const [newLearningItems, setNewLearningItems] = useState([]);

  // Live demo state
  const [liveEmails, setLiveEmails] = useState(EMAILS.slice(1)); // Start without email 1
  const [aiReadingId, setAiReadingId] = useState(null);
  const [arrivingId, setArrivingId] = useState(null);
  const [showToast, setShowToast] = useState(false);
  const [toastMsg, setToastMsg] = useState('');
  const [typingDraft, setTypingDraft] = useState('');
  const [isTypingDraft, setIsTypingDraft] = useState(false);
  const [draftReady, setDraftReady] = useState(false);
  const typeTimerRef = React.useRef(null);
  const typeIdxRef = React.useRef(0);

  // Auto-play on mount
  React.useEffect(() => {
    const timers = [];
    const t = (ms, fn) => { const id = setTimeout(fn, ms); timers.push(id); };

    // Email A arrives
    t(1400, () => { setToastMsg('📧 New email'); setShowToast(true); });
    t(2200, () => {
      setArrivingId(10);
      setLiveEmails(prev => [DEMO_EMAIL_A, ...prev]);
      setAiReadingId(10);
    });
    t(4200, () => { setAiReadingId(null); setShowToast(false); });
    t(4800, () => { setArrivingId(null); });

    // Email B arrives
    t(6000, () => { setToastMsg('📧 New email'); setShowToast(true); });
    t(6800, () => {
      setArrivingId(11);
      setLiveEmails(prev => [DEMO_EMAIL_B, ...prev]);
      setAiReadingId(11);
    });
    t(8600, () => { setAiReadingId(null); setShowToast(false); });
    t(9200, () => { setArrivingId(null); setSelectedId(11); });

    // Draft typewriter
    t(10000, () => {
      setIsTypingDraft(true);
      typeIdxRef.current = 0;
      const full = DEMO_EMAIL_B.draft;
      typeTimerRef.current = setInterval(() => {
        typeIdxRef.current += 1;
        setTypingDraft(full.slice(0, typeIdxRef.current));
        if (typeIdxRef.current >= full.length) {
          clearInterval(typeTimerRef.current);
          setIsTypingDraft(false);
          setDraftReady(true);
        }
      }, 22);
    });

    return () => {
      timers.forEach(clearTimeout);
      if (typeTimerRef.current) clearInterval(typeTimerRef.current);
    };
  }, []);

  const selectedEmail = liveEmails.find(e => e.id === selectedId);

  const unreadCount = liveEmails.filter(e => e.unread && !approvedIds.has(e.id)).length;
  const pendingDraftCount = liveEmails.filter(e => !approvedIds.has(e.id)).length;
  const pendingInvoiceCount = liveEmails.filter(e => e.hasInvoice && !approvedInvoices.has(e.id)).length;

  const handleApprove = id => {
    setApprovedIds(prev => new Set([...prev, id]));
  };

  const handleApproveInvoice = id => {
    setApprovedInvoices(prev => new Set([...prev, id]));
    handleApprove(id); // also approve the email reply
  };

  const handleLearn = (email, editedText) => {
    const newItem = {
      id: Date.now(),
      rule: `Adapted reply style for ${email.category} emails from ${email.from.split(' ')[0]}`,
      source: `Manually edited draft for ${email.from}`,
      timestamp: 'Just now',
      applied: 1,
    };
    setLearningHistory(prev => [...prev, newItem]);
    setNewLearningItems(prev => [...prev, newItem]);
  };

  const handleSelectEmail = id => {
    setSelectedId(id);
    setView('triage');
  };

  return (
    <div className="app">
      {showToast && (
        <div className="live-toast">
          <div className="toast-pulse"/>
          <span className="toast-text">{toastMsg}</span>
        </div>
      )}

      <div className="app-main">
        <Sidebar
          view={view}
          setView={setView}
          unreadCount={unreadCount}
          pendingDraftCount={pendingDraftCount}
          pendingInvoiceCount={pendingInvoiceCount}
        />

        <div className="main-content">
          {view === 'triage' && (
            <div className="triage-view">
              <EmailListPane
                emails={liveEmails}
                selectedId={selectedId}
                onSelect={setSelectedId}
                filter={filter}
                setFilter={setFilter}
                approvedIds={approvedIds}
                aiReadingId={aiReadingId}
                arrivingId={arrivingId}
              />
              {selectedEmail
                ? <DetailPane
                    email={selectedEmail}
                    approvedIds={approvedIds}
                    approvedInvoices={approvedInvoices}
                    onApprove={handleApprove}
                    onApproveInvoice={handleApproveInvoice}
                    onLearn={handleLearn}
                    learningCount={learningHistory.length}
                    typingDraft={typingDraft}
                    isTypingDraft={isTypingDraft}
                    draftReady={draftReady}
                  />
                : <div className="detail-pane">
                    <div className="detail-empty">
                      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="rgba(15,23,42,0.18)" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round">
                        <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/>
                        <path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/>
                      </svg>
                      <div className="empty-text">Emails arrive here automatically<br/>Watch the AI triage them in real time</div>
                    </div>
                  </div>
              }
            </div>
          )}

          {view === 'drafts' && (
            <DraftsView emails={liveEmails} approvedIds={approvedIds} onSelectEmail={handleSelectEmail}/>
          )}

          {view === 'invoices' && (
            <InvoicesView approvedInvoices={approvedInvoices}/>
          )}

          {view === 'learning' && (
            <LearningView history={learningHistory} newItems={newLearningItems}/>
          )}

          {view === 'settings' && (
            <SettingsView/>
          )}
        </div>
      </div>
      <div className="app-footer">Powered by OTW Studios</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
