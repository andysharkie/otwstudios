<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Free Workflow Audit — OTW Studios</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif;}
    html{scroll-behavior:smooth;}
    body{background:#f8fafc;color:#0f172a;min-height:100vh;}

    input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:#e2e8f0;outline:none;cursor:pointer;}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#F59E0B;cursor:pointer;box-shadow:0 0 0 4px rgba(245,158,11,0.18);}
    input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#F59E0B;cursor:pointer;border:none;}

    .inp{background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:14px 18px;color:#0f172a;font-size:15px;width:100%;outline:none;transition:border-color 0.2s;}
    .inp:focus{border-color:rgba(245,158,11,0.55);}
    .inp::placeholder{color:#94a3b8;}
    select.inp option{background:#fff;color:#0f172a;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
    @keyframes countUp{from{opacity:0;transform:scale(0.85);}to{opacity:1;transform:scale(1);}}
    @keyframes slideIn{from{opacity:0;transform:translateX(-16px);}to{opacity:1;transform:translateX(0);}}
    @keyframes redGlow{0%,100%{box-shadow:0 0 24px rgba(239,68,68,0.12);}50%{box-shadow:0 0 48px rgba(239,68,68,0.22);}}

    .fade-up{animation:fadeUp 0.4s ease forwards;}
    .otw-products-menu{display:none;}
    .otw-products-dropdown:hover .otw-products-menu{display:block;}
    .otw-products-dropdown:hover .otw-products-btn svg{transform:rotate(180deg);}
    .otw-products-btn svg{transition:transform 0.2s ease;}
    .count-up{animation:countUp 0.6s ease forwards;}
    .slide-in{animation:slideIn 0.3s ease forwards;}
    .red-glow{animation:redGlow 2.5s ease-in-out infinite;}

    .progress-track{background:#e2e8f0;border-radius:4px;height:4px;overflow:hidden;}
    .progress-fill{height:100%;background:linear-gradient(90deg,#F59E0B,#FCD34D);border-radius:4px;transition:width 0.5s ease;}

    .flow-node{border-radius:10px;padding:10px 14px;text-align:center;font-size:11px;font-weight:600;line-height:1.4;}
    .flow-node.neutral{background:#f8fafc;border:1px solid #e2e8f0;color:#64748b;}
    .flow-node.bad{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.22);color:#ef4444;}
    .flow-node.good{background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.28);color:#b45309;}
    .flow-node.lost{background:rgba(239,68,68,0.10);border:1px solid rgba(239,68,68,0.35);color:#ef4444;font-weight:700;}
    .flow-node.captured{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.35);color:#16a34a;font-weight:700;}
    .flow-arrow{text-align:center;font-size:16px;color:#cbd5e1;padding:2px 0;}
    .flow-arrow.gold{color:rgba(245,158,11,0.45);}

    .pain-pill{display:flex;align-items:flex-start;gap:12px;background:rgba(239,68,68,0.04);border:1px solid rgba(239,68,68,0.15);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
    .fix-pill{display:flex;align-items:flex-start;gap:12px;background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.18);border-radius:12px;padding:14px 16px;margin-bottom:10px;}

    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:2px;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const CALENDLY_URL        = "https://calendly.com/YOUR_LINK_HERE";
const EMAILJS_PUBLIC_KEY  = "YOUR_PUBLIC_KEY";
const EMAILJS_SERVICE_ID  = "YOUR_SERVICE_ID";
const EMAILJS_TEMPLATE_ID = "YOUR_TEMPLATE_ID";

function fmt(n) { return '$' + Math.round(n).toLocaleString('en-AU'); }

function calcLoss(d) {
  const missedRev = (d.missedCalls||0) * 4.3 * (d.avgJobValue||0) * 0.38;
  const quoteRev  = (d.deadQuotes||0)  * 4.3 * (d.avgJobValue||0) * 0.55;
  const adminCost = (d.adminHours||0)  * 4.3 * 75;
  const total     = Math.round(missedRev + quoteRev + adminCost);
  return {
    missedRev: Math.round(missedRev),
    quoteRev:  Math.round(quoteRev),
    adminCost: Math.round(adminCost),
    total,
    annual:    total * 12,
    missedCallsPerMonth: Math.round((d.missedCalls||0) * 4.3),
    coldQuotesPerMonth:  Math.round((d.deadQuotes||0)  * 4.3),
    adminHrsPerMonth:    Math.round((d.adminHours||0)  * 4.3),
  };
}

// ── ANIMATED COUNTER ─────────────────────────────────
function AnimCounter({ value, color='#EF4444', size=22 }) {
  const [display, setDisplay] = useState(0);
  const prev = useRef(0);
  useEffect(() => {
    const start = prev.current, end = value, dur = 700, t0 = Date.now();
    const step = () => {
      const p = Math.min((Date.now()-t0)/dur, 1);
      const e = 1 - Math.pow(1-p, 3);
      setDisplay(Math.round(start + (end-start)*e));
      if (p < 1) requestAnimationFrame(step); else prev.current = end;
    };
    requestAnimationFrame(step);
  }, [value]);
  return <span style={{fontSize:size, fontWeight:900, color, letterSpacing:'-0.02em'}}>{fmt(display)}</span>;
}

// ── FLOATING TICKER ──────────────────────────────────
function Ticker({ amount }) {
  const [disp, setDisp] = useState(0);
  const prev = useRef(0);
  useEffect(() => {
    const start=prev.current, end=amount, dur=600, t0=Date.now();
    const step=()=>{
      const p=Math.min((Date.now()-t0)/dur,1), e=1-Math.pow(1-p,3);
      setDisp(Math.round(start+(end-start)*e));
      if(p<1) requestAnimationFrame(step); else prev.current=end;
    };
    requestAnimationFrame(step);
  }, [amount]);
  if (!amount) return null;
  return (
    <div style={{
      position:'fixed',top:72,right:16,zIndex:300,
      background:'#fff',backdropFilter:'blur(12px)',
      border:'1.5px solid rgba(239,68,68,0.3)',borderRadius:14,
      padding:'10px 16px',boxShadow:'0 4px 24px rgba(0,0,0,0.08)',
    }}>
      <div style={{fontSize:9,fontWeight:800,color:'rgba(239,68,68,0.6)',textTransform:'uppercase',letterSpacing:'0.12em',marginBottom:2}}>Monthly leak</div>
      <div style={{fontSize:20,fontWeight:900,color:'#EF4444',letterSpacing:'-0.02em'}}>{fmt(disp)}</div>
    </div>
  );
}

// ── SLIDER ───────────────────────────────────────────
function Slider({ label, hint, value, min, max, step=1, onChange, display }) {
  return (
    <div style={{marginBottom:32}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:12}}>
        <div>
          <div style={{fontSize:14,fontWeight:600,color:'#475569'}}>{label}</div>
          {hint && <div style={{fontSize:11,color:'#94a3b8',marginTop:2}}>{hint}</div>}
        </div>
        <div style={{fontSize:26,fontWeight:900,color:'#F59E0B',letterSpacing:'-0.02em',flexShrink:0,marginLeft:16}}>
          {display !== undefined ? display : value}
        </div>
      </div>
      <input type="range" min={min} max={max} step={step} value={value}
        onChange={e => onChange(Number(e.target.value))}/>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:6,fontSize:10,color:'#cbd5e1'}}>
        <span>{min}</span><span>{max}</span>
      </div>
    </div>
  );
}

// ── NAV ──────────────────────────────────────────────
function Nav({ step, total }) {
  return (
    <header style={{
      position:'fixed',top:0,left:0,right:0,zIndex:200,
      background:'rgba(255,255,255,0.96)',backdropFilter:'blur(14px)',
      borderBottom:'1px solid #e2e8f0',
      padding:'14px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',
      boxShadow:'0 1px 8px rgba(0,0,0,0.06)',
    }}>
      <a href="index.html" style={{textDecoration:'none'}}>
        <div style={{fontSize:14,fontWeight:800,color:'#0f172a'}}>OTW Studios</div>
        <div style={{fontSize:9,fontWeight:700,color:'#F59E0B',textTransform:'uppercase',letterSpacing:'0.14em',marginTop:1}}>Free Audit</div>
      </a>
      <div className="otw-products-dropdown" style={{position:'relative'}}>
        <button className="otw-products-btn" style={{display:'flex',alignItems:'center',gap:5,fontSize:13,fontWeight:600,color:'#475569',background:'none',border:'none',cursor:'pointer',padding:'4px 0'}}>
          Products
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div className="otw-products-menu" style={{position:'absolute',top:'calc(100% + 10px)',left:'50%',transform:'translateX(-50%)',width:224,background:'#fff',border:'1px solid #e2e8f0',borderRadius:16,boxShadow:'0 12px 40px rgba(0,0,0,0.12)',padding:8,zIndex:300}}>
          <a href="otw_ai_receptionist.html" style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 12px',borderRadius:10,textDecoration:'none',transition:'background 0.15s'}}>
            <span style={{fontSize:13,fontWeight:600,color:'#0f172a'}}>OTW Receptionist</span>
            <span style={{fontSize:10,fontWeight:700,color:'#d97706',textTransform:'uppercase',letterSpacing:'0.05em'}}>Live</span>
          </a>
          <a href="otw_triageai.html" style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 12px',borderRadius:10,textDecoration:'none'}}>
            <span style={{fontSize:13,fontWeight:600,color:'#0f172a'}}>OTW TriageAI</span>
            <span style={{fontSize:10,fontWeight:700,color:'#d97706',textTransform:'uppercase',letterSpacing:'0.05em'}}>Live</span>
          </a>
          <div style={{margin:'6px 0',borderTop:'1px solid #f1f5f9'}}/>
          <a href="otw_scheduling.html" style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 12px',borderRadius:10,textDecoration:'none'}}>
            <span style={{fontSize:13,fontWeight:500,color:'#94a3b8'}}>OTW Scheduling</span>
            <span style={{fontSize:10,fontWeight:500,color:'#cbd5e1',textTransform:'uppercase',letterSpacing:'0.05em'}}>Soon</span>
          </a>
          <a href="otw_debtcollector.html" style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 12px',borderRadius:10,textDecoration:'none'}}>
            <span style={{fontSize:13,fontWeight:500,color:'#94a3b8'}}>OTW DebtCollector</span>
            <span style={{fontSize:10,fontWeight:500,color:'#cbd5e1',textTransform:'uppercase',letterSpacing:'0.05em'}}>Soon</span>
          </a>
          <a href="otw_reviewgenius.html" style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 12px',borderRadius:10,textDecoration:'none'}}>
            <span style={{fontSize:13,fontWeight:500,color:'#94a3b8'}}>OTW ReviewGenius</span>
            <span style={{fontSize:10,fontWeight:500,color:'#cbd5e1',textTransform:'uppercase',letterSpacing:'0.05em'}}>Soon</span>
          </a>
        </div>
      </div>
      {step > 0 && step <= total && (
        <div style={{fontSize:12,fontWeight:600,color:'#94a3b8'}}>Step {step} of {total}</div>
      )}
    </header>
  );
}

// ── BTN ──────────────────────────────────────────────
function Btn({ onClick, children, disabled=false, ghost=false }) {
  return (
    <button onClick={onClick} disabled={disabled} style={{
      flex: ghost ? 1 : 2,
      background: ghost ? '#fff' : disabled ? 'rgba(245,158,11,0.25)' : '#F59E0B',
      border: ghost ? '1.5px solid #e2e8f0' : 'none',
      borderRadius: 50, padding: '15px',
      fontWeight: 800, fontSize: 14,
      color: ghost ? '#64748b' : disabled ? '#fff' : '#fff',
      cursor: disabled ? 'not-allowed' : 'pointer', transition: 'all 0.2s',
      fontFamily: 'Inter',
    }}>{children}</button>
  );
}

// ── INLINE LOSS CALLOUT ───────────────────────────────
function LossCallout({ amount, label }) {
  if (!amount) return null;
  return (
    <div className="slide-in" style={{
      background:'#fff',border:'1.5px solid rgba(239,68,68,0.2)',
      borderRadius:14,padding:'16px 20px',marginBottom:28,
      boxShadow:'0 2px 12px rgba(239,68,68,0.07)',
    }}>
      <div style={{fontSize:11,fontWeight:700,color:'rgba(239,68,68,0.55)',marginBottom:4}}>{label}</div>
      <div style={{fontSize:24,fontWeight:900,color:'#EF4444',letterSpacing:'-0.02em'}}>{fmt(amount)}<span style={{fontSize:13,fontWeight:500,color:'rgba(239,68,68,0.4)'}}>/month</span></div>
    </div>
  );
}

// ── WORKFLOW DIAGRAM ─────────────────────────────────
function WorkflowDiagram({ loss, data }) {
  const GOLD='#F59E0B', RED='#EF4444', TEAL='#0d9488';
  const C = { tri:100, cur:310, sch:520, otw:770, orc:980, out:1180 };
  const RW = { top:155, mid:320, bot:485 };
  const NR = 48;
  const F = {fontFamily:'Inter,sans-serif'};

  // SVG icon helper — renders a Feather-style icon centered at (cx,cy)
  // paths are written in 24×24 space; we translate+scale to fit inside the node
  const sc = 1.6, off = (24*sc)/2;
  function icon(cx, cy, children) {
    return (
      <g transform={`translate(${cx-off},${cy-off}) scale(${sc})`}
         fill="none" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
        {children}
      </g>
    );
  }

  return (
    <div style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:20,padding:'24px 16px 20px',marginBottom:32,overflow:'hidden',boxShadow:'0 2px 20px rgba(0,0,0,0.06)'}}>
      <div style={{fontSize:10,fontWeight:800,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.14em',marginBottom:16,paddingLeft:4}}>Your workflow — before vs after OTW</div>
      <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
        <svg viewBox="0 0 1290 610" style={{width:'100%',minWidth:720,height:'auto',display:'block'}}>
          <defs>
            <pattern id="wf-dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
              <circle cx="1" cy="1" r="1.2" fill="#e2e8f0"/>
            </pattern>
            <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
              <path d="M0,0 L0,6 L8,3 z" fill="#EF4444" opacity="0.55"/>
            </marker>
            <marker id="arr-gold" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
              <path d="M0,0 L0,6 L8,3 z" fill="#F59E0B"/>
            </marker>
            <marker id="arr-slate" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
              <path d="M0,0 L0,6 L8,3 z" fill="rgba(148,163,184,0.6)"/>
            </marker>
          </defs>

          {/* Background */}
          <rect width="1290" height="610" fill="url(#wf-dots)" rx="12"/>

          {/* Column dividers */}
          {[205,415,645,875,1080].map((x,i)=>(
            <line key={i} x1={x} y1={52} x2={x} y2={545} stroke="#e2e8f0" strokeWidth="1" strokeDasharray="3,6"/>
          ))}

          {/* Column headers */}
          {[
            {label:'TRIGGERS',      x:C.tri},
            {label:'CURRENT STATE', x:C.cur},
            {label:'SCHEDULING',    x:C.sch},
            {label:'OTW PRODUCTS',  x:C.otw},
            {label:'ORCHESTRATION', x:C.orc},
            {label:'OUTCOMES',      x:C.out},
          ].map(h=>(
            <text key={h.label} x={h.x} y="38" textAnchor="middle"
              style={{fontSize:9.5,fontWeight:800,fill:'#94a3b8',letterSpacing:'1.6px',...F}}>
              {h.label}
            </text>
          ))}

          {/* ── PROBLEM PATHS (red dashed) ── */}
          <path d={`M ${C.tri+NR} ${RW.top} L ${C.cur-NR-6} ${RW.top}`} fill="none" stroke={RED} strokeWidth="1.8" strokeDasharray="6,4" opacity="0.5" markerEnd="url(#arr-red)"/>
          <path d={`M ${C.cur} ${RW.top+NR} L ${C.cur} ${RW.mid-NR-6}`} fill="none" stroke={RED} strokeWidth="1.8" strokeDasharray="6,4" opacity="0.5" markerEnd="url(#arr-red)"/>
          <path d={`M ${C.cur+NR} ${RW.mid} L ${C.sch-NR-6} ${RW.mid}`} fill="none" stroke={RED} strokeWidth="1.8" strokeDasharray="6,4" opacity="0.5" markerEnd="url(#arr-red)"/>
          <path d={`M ${C.sch} ${RW.mid+NR} L ${C.sch} ${RW.bot-NR-6}`} fill="none" stroke={RED} strokeWidth="1.8" strokeDasharray="6,4" opacity="0.5" markerEnd="url(#arr-red)"/>
          {/* emails → email on track */}
          <path d={`M ${C.tri+NR} ${RW.bot} L ${C.cur-NR-6} ${RW.bot}`} fill="none" stroke="rgba(148,163,184,0.45)" strokeWidth="1.8" markerEnd="url(#arr-slate)"/>

          {/* ── OTW SOLUTION PATHS (gold solid) ── */}
          <path d={`M ${C.tri+NR} ${RW.top} C 310 68 560 68 ${C.otw-NR-6} ${RW.top}`} fill="none" stroke={GOLD} strokeWidth="2.5" opacity="0.85" markerEnd="url(#arr-gold)"/>
          <path d={`M ${C.otw+NR} ${RW.top} L ${C.orc-NR-6} ${RW.top}`} fill="none" stroke={GOLD} strokeWidth="2.5" opacity="0.85" markerEnd="url(#arr-gold)"/>
          <path d={`M ${C.orc+NR} ${RW.top} L ${C.out-NR-6} ${RW.top}`} fill="none" stroke={GOLD} strokeWidth="2.5" opacity="0.85" markerEnd="url(#arr-gold)"/>
          <path d={`M ${C.orc} ${RW.top+NR} C ${C.orc} 440 ${C.out} 440 ${C.out} ${RW.bot-NR-6}`} fill="none" stroke={GOLD} strokeWidth="2.5" opacity="0.85" markerEnd="url(#arr-gold)"/>

          {/* ── NODES ── */}

          {/* Calls In */}
          <circle cx={C.tri} cy={RW.top} r={NR} fill="rgba(99,102,241,0.07)" stroke="rgba(99,102,241,0.4)" strokeWidth="2"/>
          {icon(C.tri, RW.top,
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.4 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.37a16 16 0 0 0 6.72 6.72l1.73-1.74a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" stroke="rgba(99,102,241,0.8)"/>
          )}
          <text x={C.tri} y={RW.top+NR+17} textAnchor="middle" style={{fontSize:11,fontWeight:700,fill:'#475569',...F}}>Calls In</text>

          {/* I Answer */}
          <circle cx={C.cur} cy={RW.top} r={NR} fill="rgba(239,68,68,0.07)" stroke="rgba(239,68,68,0.4)" strokeWidth="2"/>
          {icon(C.cur, RW.top, <>
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="rgba(239,68,68,0.8)"/>
            <circle cx="12" cy="7" r="4" stroke="rgba(239,68,68,0.8)"/>
          </>)}
          <text x={C.cur} y={RW.top+NR+17} textAnchor="middle" style={{fontSize:11,fontWeight:700,fill:'#475569',...F}}>I Answer</text>
          <text x={C.cur} y={RW.top+NR+31} textAnchor="middle" style={{fontSize:10,fontWeight:700,fill:RED,...F}}>Productivity loss</text>

          {/* Missed Calls */}
          <circle cx={C.cur} cy={RW.mid} r={NR} fill="rgba(239,68,68,0.09)" stroke="rgba(239,68,68,0.55)" strokeWidth="2"/>
          {icon(C.cur, RW.mid, <>
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" stroke="rgba(239,68,68,0.8)"/>
            <line x1="12" y1="9" x2="12" y2="13" stroke="rgba(239,68,68,0.8)"/>
            <line x1="12" y1="17" x2="12.01" y2="17" stroke="rgba(239,68,68,0.8)"/>
          </>)}
          <text x={C.cur} y={RW.mid+NR+17} textAnchor="middle" style={{fontSize:11,fontWeight:700,fill:'#475569',...F}}>Missed Calls</text>
          {loss.missedRev>0 && <text x={C.cur} y={RW.mid+NR+31} textAnchor="middle" style={{fontSize:11,fontWeight:800,fill:RED,...F}}>{fmt(loss.missedRev)}/mo lost</text>}

          {/* Manual Calendar */}
          <circle cx={C.sch} cy={RW.mid} r={NR} fill="rgba(148,163,184,0.07)" stroke="rgba(148,163,184,0.35)" strokeWidth="2"/>
          {icon(C.sch, RW.mid, <>
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" stroke="rgba(148,163,184,0.7)"/>

              value={data.quotesPerWeek} min={1} max={30}
              onChange={v=>set('quotesPerWeek',v)}
              display={data.quotesPerWeek + ' quotes'}
            />
            <Slider
              label="How many go quiet without follow-up?"
              hint="Customer never hears back — and goes with someone else"
              value={data.deadQuotes} min={0} max={Math.min(data.quotesPerWeek, 20)}
              onChange={v=>set('deadQuotes',Math.min(v, data.quotesPerWeek))}
              display={data.deadQuotes + (data.deadQuotes === 1 ? ' quote' : ' quotes')}
            />
            <LossCallout amount={loss.quoteRev} label="Dead quote revenue leaking every month:"/>
            <div style={{display:'flex',gap:10}}>
              <Btn onClick={back} ghost>← Back</Btn>
              <Btn onClick={next}>Next →</Btn>
            </div>
          </div>
        )}

        {/* ── STEP 4: ADMIN ── */}
        {step === 4 && (
          <div className="fade-up" style={cardStyle}>
            <h2 style={{fontSize:24,fontWeight:800,color:'#0f172a',letterSpacing:'-0.02em',marginBottom:6}}>Admin & inbox time</h2>
            <p style={{fontSize:14,color:'#94a3b8',marginBottom:28,lineHeight:1.6}}>Every hour on admin is an hour you could be billing.</p>

            <Slider
              label="Hours per week on admin tasks"
              hint="Emails, booking calls, chasing invoices, scheduling"
              value={data.adminHours} min={1} max={30}
              onChange={v=>set('adminHours',v)}
              display={data.adminHours + ' hrs/week'}
            />
            <LossCallout amount={loss.adminCost} label="Admin time cost every month (at $75/hr):"/>

            <div style={{
              background:'rgba(245,158,11,0.06)',border:'1.5px solid rgba(245,158,11,0.2)',
              borderRadius:14,padding:'16px 20px',marginBottom:28,
            }}>
              <div style={{fontSize:11,fontWeight:700,color:'rgba(180,83,9,0.7)',marginBottom:6}}>Total monthly revenue leak across all three areas:</div>
              <div style={{fontSize:34,fontWeight:900,color:'#F59E0B',letterSpacing:'-0.025em'}}>{fmt(loss.total)}<span style={{fontSize:14,fontWeight:500,color:'rgba(245,158,11,0.5)'}}>/month</span></div>
              <div style={{fontSize:12,color:'#94a3b8',marginTop:4}}>{fmt(loss.annual)} per year in recoverable revenue</div>
            </div>
            <div style={{display:'flex',gap:10}}>
              <Btn onClick={back} ghost>← Back</Btn>
              <Btn onClick={next}>See my full report →</Btn>
            </div>
          </div>
        )}

        {/* ── STEP 5: CONTACT ── */}
        {step === 5 && (
          <div className="fade-up" style={cardStyle}>
            <h2 style={{fontSize:24,fontWeight:800,color:'#0f172a',letterSpacing:'-0.02em',marginBottom:6}}>Where should we send your report?</h2>
            <p style={{fontSize:14,color:'#94a3b8',marginBottom:24,lineHeight:1.6}}>Andy will review your audit personally before any call — so you get specific recommendations, not a generic pitch.</p>
            <div style={{
              background:'rgba(239,68,68,0.05)',border:'1.5px solid rgba(239,68,68,0.15)',
              borderRadius:16,padding:'18px',textAlign:'center',marginBottom:24,
            }}>
              <div style={{fontSize:10,fontWeight:800,color:'rgba(239,68,68,0.5)',textTransform:'uppercase',letterSpacing:'0.14em',marginBottom:6}}>Your annual revenue leak</div>
              <div style={{fontSize:44,fontWeight:900,color:'#EF4444',letterSpacing:'-0.035em'}}>{fmt(loss.annual)}</div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:14,marginBottom:24}}>
              <div>
                <label style={{display:'block',fontSize:11,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:7}}>Email address</label>
                <input className="inp" type="email" placeholder="dave@morrisonplumbing.com.au" value={data.email}
                  onChange={e=>set('email',e.target.value)}/>
              </div>
              <div>
                <label style={{display:'block',fontSize:11,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:7}}>Phone number</label>
                <input className="inp" type="tel" placeholder="0412 345 678" value={data.phone}
                  onChange={e=>set('phone',e.target.value)}/>
              </div>
            </div>
            <p style={{fontSize:11,color:'#94a3b8',marginBottom:20,textAlign:'center'}}>No spam. Andy uses this to send your report and reach out after you book a call.</p>
            <div style={{display:'flex',gap:10}}>
              <Btn onClick={back} ghost>← Back</Btn>
              <Btn onClick={submit} disabled={!data.email}>Show me my full report →</Btn>
            </div>
          </div>
        )}

        {/* ── RESULTS ── */}
        {step === 6 && <Results data={data} loss={loss}/>}

      </div>

      <div style={{textAlign:'center',padding:'16px 24px 36px',borderTop:'1px solid #e2e8f0'}}>
        <span style={{fontSize:10,fontWeight:500,color:'#cbd5e1'}}>Powered by OTW Studios</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
