<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OTW Studios — Free Business Audit</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- EmailJS — client-side email sending (free 200/mo). Setup: https://emailjs.com
       1. Create account → Add Email Service (Gmail) → get Service ID
       2. Create two templates: admin-notification + client-report → get Template IDs
       3. Get your Public Key from Account > API Keys
       Replace the 3 placeholders in sendEmails() below. -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: { 300:'#FDE68A', 400:'#FCD34D', 500:'#F59E0B', 600:'#D97706', 700:'#B45309' },
          },
          fontFamily:{ sans:['-apple-system','BlinkMacSystemFont','Inter','Segoe UI','sans-serif'] }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    *{ font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif; }
    html{ scroll-behavior:smooth; }
    ::-webkit-scrollbar{ width:6px; } ::-webkit-scrollbar-track{ background:transparent; } ::-webkit-scrollbar-thumb{ background:rgba(0,0,0,0.12); border-radius:3px; }

    .btn-gold{ transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .22s ease,background-color .15s ease; }
    .btn-gold:hover{ transform:translateY(-2px); box-shadow:0 10px 28px rgba(245,158,11,.4); }
    .btn-gold:active{ transform:translateY(0); transition-duration:.08s; }
    .btn-dark{ transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .22s ease; }
    .btn-dark:hover{ transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.2); }
    .btn-ghost{ position:relative;overflow:hidden;transition:color .22s ease,border-color .22s ease,transform .22s ease; }
    .btn-ghost::after{ content:'';position:absolute;inset:0;background:rgba(0,0,0,.04);transform:translateY(101%);transition:transform .28s cubic-bezier(.4,0,.2,1);border-radius:inherit;z-index:0; }
    .btn-ghost>*{ position:relative;z-index:1; }
    .btn-ghost:hover::after{ transform:translateY(0); }
    .btn-ghost:hover{ border-color:rgba(0,0,0,.25)!important;color:rgba(0,0,0,.65)!important;transform:translateY(-1px); }

    .card{ background:#fff;border:1px solid #E5E7EB;transition:all .2s ease; }
    .card:hover{ border-color:rgba(245,158,11,.4);box-shadow:0 4px 20px rgba(0,0,0,.06); }
    .gold-glow{ box-shadow:0 0 40px rgba(245,158,11,.2); }

    /* Workflow canvas */
    .canvas-grid{ background-color:#FAFAFA;background-image:radial-gradient(circle,rgba(0,0,0,.07) 1px,transparent 1px);background-size:20px 20px; }

    /* Node hover */
    .node-wrapper{ position:relative; }
    .node-detail-card{
      opacity:0; transform:translateX(-50%) translateY(6px) scale(.96); pointer-events:none;
      transition:opacity .22s ease,transform .22s cubic-bezier(.34,1.56,.64,1);
      background:rgba(255,255,255,.98); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    }
    .node-wrapper:hover .node-detail-card{ opacity:1; transform:translateX(-50%) translateY(0) scale(1); pointer-events:auto; }
    .node-circle{ transition:box-shadow .25s ease,border-color .25s ease,transform .2s ease; }
    .node-wrapper:hover .node-circle{ transform:scale(1.12); }
    .node-wrapper:hover .node-circle.circle-pain{ box-shadow:0 0 20px rgba(239,68,68,.25); }
    .node-wrapper:hover .node-circle.circle-otw{ box-shadow:0 0 20px rgba(245,158,11,.3); }
    .node-wrapper:hover .node-circle.circle-outcome{ box-shadow:0 0 20px rgba(16,185,129,.2); }
    .node-wrapper:hover .node-circle.circle-trigger{ box-shadow:0 0 16px rgba(99,102,241,.2); }
    .node-label{ transition:color .2s ease; }
    .node-wrapper:hover .node-label{ color:#111827; }

    /* Progress bar */
    .progress-fill{ transition:width .4s cubic-bezier(.34,1.56,.64,1); }

    /* Input styling */
    input:focus, textarea:focus, select:focus{ outline:none!important; box-shadow:0 0 0 3px rgba(245,158,11,.15); }

    @keyframes fadeUp{ from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .fade-up{ animation:fadeUp .35s ease forwards; }
    @keyframes generating{ 0%,100%{opacity:.4} 50%{opacity:1} }
    .generating{ animation:generating 1.2s ease infinite; }

    /* Chips */
    .chip{ cursor:pointer; transition:all .15s ease; user-select:none; }
    .chip:hover{ border-color:rgba(245,158,11,.5)!important;background:rgba(245,158,11,.05)!important; }
    .chip.selected{ background:rgba(245,158,11,.1)!important; border-color:rgba(245,158,11,.55)!important; color:#D97706!important; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased">
<div id="root"></div>
<script type="text/babel">
  const { useState, useMemo, useEffect } = React;

  /* ── ICONS ── */
  const Ic = ({ch,cls="",w=18}) => <svg className={cls} width={w} height={w} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">{ch}</svg>;
  const IPhone  = p => <Ic {...p} ch={<path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.13.81.36 1.61.68 2.36a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.75.32 1.55.55 2.36.68A2 2 0 0122 16.92z"/>}/>;
  const IMail   = p => <Ic {...p} ch={<><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,7 12,13 2,7"/></>}/>;
  const ICal    = p => <Ic {...p} ch={<><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>}/>;
  const IUser   = p => <Ic {...p} ch={<><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></>}/>;
  const IAlert  = p => <Ic {...p} ch={<><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>}/>;
  const IClock  = p => <Ic {...p} ch={<><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></>}/>;
  const IMap    = p => <Ic {...p} ch={<><polygon points="1,6 1,22 8,18 16,22 23,18 23,2 16,6 8,2"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></>}/>;
  const ICheck  = p => <Ic {...p} ch={<polyline points="20,6 9,17 4,12"/>}/>;
  const ISend   = p => <Ic {...p} ch={<><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></>}/>;
  const IBot    = p => <Ic {...p} ch={<><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M12 2v6"/><circle cx="9" cy="14" r="1.5" fill="currentColor" stroke="none"/><circle cx="15" cy="14" r="1.5" fill="currentColor" stroke="none"/><path d="M9 18h6"/><path d="M2 12h1m18 0h1"/></>}/>;
  const IFilter = p => <Ic {...p} ch={<polygon points="22,3 2,3 10,12.46 10,19 14,21 14,12.46"/>}/>;
  const ITriage = p => <Ic {...p} ch={<><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,8 12,14 22,8"/><path d="M8 12l-2 2 2 2"/><path d="M14 14h4"/></>}/>;
  const IArrow  = p => <Ic {...p} ch={<><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12,5 19,12 12,19"/></>}/>;
  const IChevR  = p => <Ic {...p} ch={<polyline points="9,18 15,12 9,6"/>}/>;
  const IBld    = p => <Ic {...p} ch={<><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></>}/>;
  const ITeam   = p => <Ic {...p} ch={<><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></>}/>;
  const ITool   = p => <Ic {...p} ch={<><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></>}/>;
  const ITarget = p => <Ic {...p} ch={<><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>}/>;
  const IStar   = p => <Ic {...p} ch={<path d="M12 2l2.09 6.26L20 10l-5.91 1.74L12 18l-2.09-6.26L4 10l5.91-1.74L12 2z"/>}/>;

  const ICONS = { phone:IPhone, mail:IMail, calendar:ICal, user:IUser, alert:IAlert, clock:IClock, map:IMap, check:ICheck, send:ISend, bot:IBot, filter:IFilter, triage:ITriage };

  /* ── NODE STYLES (light theme) ── */
  const NSTYLE = {
    trigger:    { border:"border-indigo-300",  bg:"bg-white", iconColor:"text-indigo-500", circleClass:"circle-trigger", detailBorder:"border-indigo-200" },
    process:    { border:"border-gray-200",    bg:"bg-white", iconColor:"text-gray-400",   circleClass:"circle-process", detailBorder:"border-gray-200" },
    pain_point: { border:"border-red-300",     bg:"bg-white", iconColor:"text-red-500",    circleClass:"circle-pain",    detailBorder:"border-red-200" },
    otw:        { border:"border-amber-300",   bg:"bg-white", iconColor:"text-amber-500",  circleClass:"circle-otw",     detailBorder:"border-amber-200" },
    outcome:    { border:"border-emerald-300", bg:"bg-white", iconColor:"text-emerald-500",circleClass:"circle-outcome", detailBorder:"border-emerald-200" },
  };

  /* ── FIELD COMPONENTS ── */
  const inputCls = "w-full rounded-xl px-4 py-3.5 text-base text-gray-900 border border-gray-200 focus:border-gold-500 transition-colors bg-white";

  function TF({ label, name, value, onChange, placeholder, required }) {
    return (
      <div>
        <label className="block text-sm font-semibold text-gray-600 mb-2">{label}{required&&<span className="text-gold-500 ml-0.5">*</span>}</label>
        <input className={inputCls} name={name} value={value||""} onChange={e=>onChange(name,e.target.value)} placeholder={placeholder||""}/>
      </div>
    );
  }
  function TA({ label, name, value, onChange, placeholder, rows=3 }) {
    return (
      <div>
        <label className="block text-sm font-semibold text-gray-600 mb-2">{label}</label>
        <textarea className={inputCls} name={name} value={value||""} onChange={e=>onChange(name,e.target.value)} placeholder={placeholder||""} rows={rows}/>
      </div>
    );
  }
  function SF({ label, name, value, onChange, options }) {
    return (
      <div>
        <label className="block text-sm font-semibold text-gray-600 mb-2">{label}</label>
        <select className={inputCls} style={{color: value?"#111827":"#9CA3AF"}}
          value={value||""} onChange={e=>onChange(name,e.target.value)}>
          <option value="">Select…</option>
          {options.map(o=><option key={o.value||o} value={o.value||o}>{o.label||o}</option>)}
        </select>
      </div>
    );
  }
  function Chips({ label, name, value=[], onChange, options, multi=true }) {
    const toggle = v => {
      if (!multi) { onChange(name, v); return; }
      const cur = Array.isArray(value) ? value : [];
      onChange(name, cur.includes(v) ? cur.filter(x=>x!==v) : [...cur,v]);
    };
    const isSelected = v => multi ? (Array.isArray(value)&&value.includes(v)) : value===v;
    return (
      <div>
        <label className="block text-sm font-semibold text-gray-600 mb-2">{label}</label>
        <div className="flex flex-wrap gap-2">
          {options.map(o=>(
            <button key={o.value||o} type="button" onClick={()=>toggle(o.value||o)}
              className={`chip rounded-full px-4 py-2 text-sm font-medium border ${isSelected(o.value||o)?"selected":"border-gray-200 text-gray-500 bg-white"}`}>
              {o.label||o}
            </button>
          ))}
        </div>
      </div>
    );
  }

  /* ── STEPS DEFINITION ── */
  const STEPS = [
    { id:"business", label:"Your Business",    icon:<IBld cls="w-4 h-4"/> },
    { id:"team",     label:"Team & Operations",icon:<ITeam cls="w-4 h-4"/> },
    { id:"phone",    label:"Phone & Calls",     icon:<IPhone cls="w-4 h-4"/> },
    { id:"email",    label:"Email & Admin",     icon:<IMail cls="w-4 h-4"/> },
    { id:"schedule", label:"Scheduling",        icon:<ICal cls="w-4 h-4"/> },
    { id:"tools",    label:"Current Tools",     icon:<ITool cls="w-4 h-4"/> },
    { id:"goals",    label:"Goals",             icon:<ITarget cls="w-4 h-4"/> },
  ];

  /* ── AUDIT CALCULATOR ── */
  function calculateAudit(d) {
    const tradeJobs = {plumbing:380,electrical:350,hvac:420,carpentry:310,cleaning:180,landscaping:250,pest:220,auto:280};
    const trade = (d.trade||"").toLowerCase();
    const parseJobValue = (str) => {
      if (!str) return null;
      const nums = str.replace(/,/g,'').match(/\d+/g);
      if (!nums) return null;
      return nums.length >= 2 ? Math.round((parseInt(nums[0])+parseInt(nums[1]))/2) : parseInt(nums[0]);
    };
    const avgJob = parseJobValue(d.avgJobValue) || tradeJobs[Object.keys(tradeJobs).find(k=>trade.includes(k))] || 350;
    const name = d.businessName || "Your Business";
    const owner = d.ownerName || "You";
    const location = d.location || "Australia";
    const tradeLabel = d.trade || "Trade";

    const missedMap = {"none":95,"1-2":78,"3-5":52,"6-10":28,"10+":10};
    const phoneScore = missedMap[d.missedCallsPerWeek] || 50;
    const emailMap = {"immediately":90,"within-1hr":75,"same-day":55,"next-day":30,"2+days":12};
    const emailScore = emailMap[d.emailResponseTime] || 45;
    const schedMap = {"software":72,"google-calendar":52,"paper-whiteboard":28,"in-head":15};
    const schedScore = schedMap[d.schedulingMethod] || 42;
    const tools = Array.isArray(d.currentTools) ? d.currentTools : [];
    const adminScore = tools.length > 2 ? 65 : tools.length > 0 ? 42 : 28;
    const overall = Math.round((phoneScore*1.4 + emailScore + schedScore + adminScore*0.6) / 4);

    const missedPerWeek = {"none":0,"1-2":1.5,"3-5":4,"6-10":8,"10+":13}[d.missedCallsPerWeek] || 0;
    const phoneCost = Math.round(missedPerWeek * 4.3 * avgJob * 0.6);
    const emailCostMap = {"immediately":0,"within-1hr":0,"same-day":300,"next-day":900,"2+days":1800};
    const emailCost = emailCostMap[d.emailResponseTime] || 0;
    const routingCost = schedScore < 50 ? 600 : 150;
    const adminCost   = adminScore < 40 ? 800 : 300;
    const totalCost = phoneCost + emailCost + routingCost + adminCost;

    const nodes = [
      { id:"call_in",  col:0, row:0, label:"Calls In",  icon:"phone", type:"trigger", detail:`Inbound enquiries from customers looking to book ${tradeLabel.toLowerCase()} jobs.` },
      { id:"email_in", col:0, row:2, label:"Emails In", icon:"mail",  type:"trigger", detail:`Inbound email enquiries, quote requests, and customer follow-ups.` },
    ];
    const edges = [];

    if (phoneScore < 80) {
      if (d.callAnswerMethod === "owner") {
        nodes.push({ id:"owner_ans", col:1, row:0, label:`${owner} Answers`, icon:"user", type:"pain_point", detail:`Owner takes all calls while on jobs. Constant interruptions reduce productivity.`, cost:"Productivity loss" });
        edges.push({ from:"call_in", to:"owner_ans", type:"normal" });
      }
      if (missedPerWeek > 0) {
        nodes.push({ id:"missed", col:1, row:1, label:"Missed Calls", icon:"alert", type:"pain_point", detail:`${missedPerWeek < 4 ? "A few" : "Many"} calls missed weekly. Customers ring a competitor instead.`, cost:`$${phoneCost.toLocaleString()}/mo lost` });
        edges.push({ from:"call_in", to:"missed", type:"problem" });
      }
    } else {
      nodes.push({ id:"calls_ok", col:1, row:0, label:"Calls Handled", icon:"check", type:"process", detail:"Most calls are being answered well." });
      edges.push({ from:"call_in", to:"calls_ok", type:"normal" });
    }

    if (emailScore < 70) {
      nodes.push({ id:"inbox_chaos", col:1, row:2, label:"Unsorted Inbox", icon:"mail",  type:"process",    detail:"Emails arrive unfiltered. No triage, no prioritisation." });
      nodes.push({ id:"slow_reply",  col:1, row:3, label:"Slow Replies",   icon:"clock", type:"pain_point", detail:`Average reply time: ${d.emailResponseTime||"unknown"}. Hot leads go cold while waiting.`, cost:`$${emailCost.toLocaleString()}/mo lost` });
      edges.push({ from:"email_in", to:"inbox_chaos", type:"normal" });
      edges.push({ from:"inbox_chaos", to:"slow_reply", type:"problem" });
    } else {
      nodes.push({ id:"email_ok", col:1, row:2, label:"Email On Track", icon:"check", type:"process", detail:"Email response times are solid." });
      edges.push({ from:"email_in", to:"email_ok", type:"normal" });
    }

    if (schedScore < 55) {
      nodes.push({ id:"manual_cal", col:2, row:1, label:"Manual Calendar", icon:"calendar", type:"process",    detail:`Jobs booked manually via ${d.schedulingMethod||"calendar"}. Time-consuming and error-prone.` });
      nodes.push({ id:"no_routing", col:2, row:2, label:"No Route Plan",   icon:"map",      type:"pain_point", detail:"Jobs scattered across the service area. Extra driving time every day.", cost:`$${routingCost}/mo wasted` });
      edges.push({ from:"call_in",    to:"manual_cal", type:"normal" });
      edges.push({ from:"manual_cal", to:"no_routing", type:"problem" });
    }

    const showRecep  = phoneScore < 78;
    const showTriage = emailScore < 70;

    if (showRecep) {
      nodes.push({ id:"ai_recep", col:3, row:0, label:"OTW Receptionist", icon:"bot", type:"otw",
        detail:`24/7 call answering for ${name}. Captures every lead, qualifies callers, escalates emergencies, books jobs.`,
        cost:"$497/mo", features:["24/7 answering","Lead capture","Emergency transfer","Calendar booking","SMS confirmations"] });
      edges.push({ from:"call_in", to:"ai_recep", type:"solution" });
    }
    if (showTriage) {
      nodes.push({ id:"ai_triage", col:3, row:2, label:"OTW TriageAI", icon:"triage", type:"otw",
        detail:`Auto-categorise every email, draft replies in ${owner}'s voice, send instantly with approval.`,
        cost:"$347/mo", features:["Auto-categorisation","Smart drafts","Auto-send","Invoice handling","Learning loop"] });
      edges.push({ from:"email_in", to:"ai_triage", type:"solution" });
    }
    if (showRecep || showTriage) {
      const engRow = showRecep && showTriage ? 1 : showRecep ? 0 : 2;
      nodes.push({ id:"workflow_eng", col:4, row:engRow, label:"Workflow Engine", icon:"filter", type:"otw",
        detail:"Unified orchestration — deduplication, geographic scheduling, booking confirmations.",
        cost:"Included", features:["Deduplication","Geo scheduling","Confirmations","Single calendar"] });
      if (showRecep)  edges.push({ from:"ai_recep",  to:"workflow_eng", type:"solution" });
      if (showTriage) edges.push({ from:"ai_triage", to:"workflow_eng", type:"solution" });
    }

    const outCol = (showRecep || showTriage) ? 5 : 3;
    if (showRecep) {
      nodes.push({ id:"every_call", col:outCol, row:0, label:"Every Call Caught", icon:"check", type:"outcome", detail:"Zero missed calls. Every lead captured with name, suburb, job type." });
      edges.push({ from:(showRecep||showTriage)?"workflow_eng":"ai_recep", to:"every_call", type:"solution" });
    }
    if (showTriage) {
      nodes.push({ id:"fast_email", col:outCol, row:2, label:"Instant Replies", icon:"send", type:"outcome", detail:"Every email triaged and replied within minutes, not days." });
      edges.push({ from:(showRecep||showTriage)?"workflow_eng":"ai_triage", to:"fast_email", type:"solution" });
    }
    if (showRecep || showTriage) {
      nodes.push({ id:"smart_sched", col:outCol, row:1, label:"Smart Schedule", icon:"calendar", type:"outcome", detail:"Jobs clustered by suburb. Less driving, more billable hours." });
      edges.push({ from:"workflow_eng", to:"smart_sched", type:"solution" });
    }

    const recs = [];
    if (showRecep) recs.push({
      priority:1, product:"OTW Receptionist", tier:"Full",
      reason:`You're missing ${d.missedCallsPerWeek||"multiple"} calls per week. At $${avgJob.toLocaleString()} per job, that's $${phoneCost.toLocaleString()}/month walking out the door.`,
      roi:{ cost:497, saving:phoneCost, payback:"Pays for itself within weeks" }
    });
    if (showTriage) recs.push({
      priority: recs.length+1, product:"OTW TriageAI", tier:"Full",
      reason:`${d.emailResponseTime==="next-day"||d.emailResponseTime==="2+days" ? "Next-day replies" : "Slow email responses"} are costing you quotes. Customers go with whoever replies first.`,
      roi:{ cost:347, saving:emailCost||600, payback:"ROI within 2 weeks" }
    });
    if (recs.length===0) recs.push({
      priority:1, product:"OTW Receptionist", tier:"Core",
      reason:"Even efficient businesses benefit from 24/7 after-hours answering — jobs come in at all hours.",
      roi:{ cost:297, saving:800, payback:"Pays for itself in week 1" }
    });

    const tierCore = 494, tierFull = 844;
    return { name, owner, location, tradeLabel, avgJob,
      scores:{ overall, phones:phoneScore, email:emailScore, scheduling:schedScore, admin:adminScore },
      totalCost, phoneCost, emailCost, routingCost, adminCost, nodes, edges, recs,
      tiers:{

  /* ── SCORE RING ── */
  function ScoreRing({ score, size=64 }) {
    const r=(size-10)/2, circ=2*Math.PI*r, offset=circ-(score/100)*circ;
    const color=score<40?"#EF4444":score<65?"#F59E0B":"#10B981";
    return (
      <div className="relative" style={{width:size,height:size}}>
        <svg width={size} height={size} className="-rotate-90">
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#F3F4F6" strokeWidth="5"/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="5"
            strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
            style={{transition:"stroke-dashoffset 1.2s cubic-bezier(.34,1.56,.64,1)"}}/>
        </svg>
        <div className="absolute inset-0 flex items-center justify-center">
          <span className="text-base font-bold" style={{color}}>{score}</span>
        </div>
      </div>
    );
  }

  /* ── WORKFLOW CANVAS ── */
  function WorkflowCanvas({ data }) {
    const { nodes, edges } = data;
    const [hoveredId, setHoveredId] = useState(null);
    const COL_W=175, ROW_H=125, PAD_X=60, PAD_Y=50, CR=24;

    const pos = useMemo(() => {
      const p={};
      nodes.forEach(n=>{ p[n.id]={ x:PAD_X+n.col*COL_W, y:PAD_Y+n.row*ROW_H, cx:PAD_X+n.col*COL_W+60, cy:PAD_Y+n.row*ROW_H+CR }; });
      return p;
    }, [nodes]);

    const W = Math.max(...nodes.map(n=>n.col))*COL_W+190+PAD_X;
    const H = Math.max(...nodes.map(n=>n.row))*ROW_H+130+PAD_Y;
    const edgeC = { normal:"rgba(0,0,0,0.07)", problem:"rgba(239,68,68,0.4)", solution:"rgba(245,158,11,0.55)" };

    const mkPath = (fid,tid) => {
      const f=pos[fid],t=pos[tid]; if(!f||!t) return "";
      const sx=f.cx+CR+2,sy=f.cy,ex=t.cx-CR-2,ey=t.cy,dx=Math.abs(ex-sx)*0.5;
      return `M${sx},${sy} C${sx+dx},${sy} ${ex-dx},${ey} ${ex},${ey}`;
    };

    const maxCol = Math.max(...nodes.map(n=>n.col));
    const colLabels = ["Triggers","Current State","Scheduling","OTW Products","Orchestration","Outcomes"].slice(0,maxCol+1);

    return (
      <div className="rounded-3xl border border-gray-200 canvas-grid overflow-auto" style={{maxHeight:560}}>
        <div style={{width:W,height:H,position:"relative",minWidth:"100%"}}>
          {colLabels.map((l,i)=>(
            <div key={i} className="absolute text-[9px] font-semibold uppercase tracking-[0.15em] text-gray-300"
              style={{left:PAD_X+i*COL_W+20,top:16}}>{l}</div>
          ))}
          <svg style={{position:"absolute",top:0,left:0,width:W,height:H,pointerEvents:"none",zIndex:1}}>
            <defs>
              {Object.entries(edgeC).map(([k,c])=>(
                <marker key={k} id={`dm-${k}`} viewBox="0 0 8 8" refX="4" refY="4" markerWidth="5" markerHeight="5">
                  <circle cx="4" cy="4" r="3" fill={c}/>
                </marker>
              ))}
            </defs>
            {edges.map((e,i)=>(
              <path key={i} d={mkPath(e.from,e.to)} fill="none" stroke={edgeC[e.type]} strokeWidth={e.type==="normal"?1:1.5}
                strokeDasharray={e.type==="problem"?"5,3":""} markerStart={`url(#dm-${e.type})`} markerEnd={`url(#dm-${e.type})`}/>
            ))}
          </svg>
          {nodes.map(n=>{
            const p=pos[n.id];
            return (
              <div key={n.id}
                onMouseEnter={()=>setHoveredId(n.id)}
                onMouseLeave={()=>setHoveredId(null)}
                style={{position:"absolute",left:p.x,top:p.y,zIndex:hoveredId===n.id?100:3}}>
                <CompactNode node={n}/>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

      <div key="s2" className="space-y-4 fade-up">
        <Chips label="Inbound calls per day" name="callsPerDay" value={data.callsPerDay} onChange={set} multi={false} options={["0–5","6–10","11–20","20+"]}/>
        <Chips label="Missed calls per week" name="missedCallsPerWeek" value={data.missedCallsPerWeek} onChange={set} multi={false} options={[{value:"none",label:"None"},{value:"1-2",label:"1–2"},{value:"3-5",label:"3–5"},{value:"6-10",label:"6–10"},{value:"10+",label:"10+"}]}/>
        <Chips label="Who currently answers calls?" name="callAnswerMethod" value={data.callAnswerMethod} onChange={set} multi={false} options={[{value:"owner",label:"Me (the owner)"},{value:"staff",label:"A staff member"},{value:"voicemail",label:"Goes to voicemail"},{value:"missed",label:"Often just missed"}]}/>
        <Chips label="Biggest phone pain points" name="phonePains" value={data.phonePains} onChange={set} multi={true} options={["Interrupted while on jobs","After-hours calls missed","No-one available to answer","Wasting time on tyre-kickers","No system to capture leads"]}/>
      </div>,

      /* 3 – Email */
      <div key="s3" className="space-y-4 fade-up">
        <Chips label="Emails per day" name="emailsPerDay" value={data.emailsPerDay} onChange={set} multi={false} options={["0–5","6–15","16–30","30+"]}/>
        <Chips label="Typical email response time" name="emailResponseTime" value={data.emailResponseTime} onChange={set} multi={false} options={[{value:"immediately",label:"Within minutes"},{value:"within-1hr",label:"Within 1 hour"},{value:"same-day",label:"Same day"},{value:"next-day",label:"Next day"},{value:"2+days",label:"2+ days"}]}/>
        <Chips label="Types of email you get most" name="emailTypes" value={data.emailTypes} onChange={set} multi={true} options={["New job enquiries","Quote requests","Invoicing","Customer complaints","Supplier / admin"]}/>
      </div>,

      /* 4 – Scheduling */
      <div key="s4" className="space-y-4 fade-up">
        <Chips label="How do you schedule jobs?" name="schedulingMethod" value={data.schedulingMethod} onChange={set} multi={false} options={[{value:"software",label:"Job management software (ServiceM8 etc)"},{value:"google-calendar",label:"Google Calendar / iCal"},{value:"paper-whiteboard",label:"Paper or whiteboard"},{value:"in-head",label:"In my head"}]}/>
        <Chips label="How often do double-bookings happen?" name="doubleBookings" value={data.doubleBookings} onChange={set} multi={false} options={["Never","Rarely","A few times a month","Weekly"]}/>
        <Chips label="Do you optimise travel routes?" name="routeOptimise" value={data.routeOptimise} onChange={set} multi={false} options={["Yes, always","Sometimes","Rarely","No — jobs booked wherever there's a gap"]}/>
      </div>,

      /* 5 – Tools */
      <div key="s5" className="space-y-4 fade-up">
        <Chips label="Tools you currently use" name="currentTools" value={data.currentTools} onChange={set} multi={true} options={["ServiceM8","Tradify","Xero","MYOB","QuickBooks","Google Workspace","Slack","None of the above"]}/>
        <Chips label="Comfort with new tech tools" name="techComfort" value={data.techComfort} onChange={set} multi={false} options={["Very comfortable","Comfortable","Bit hesitant","Not comfortable"]}/>
      </div>,

      /* 6 – Goals */
      <div key="s6" className="space-y-4 fade-up">
        <Chips label="Biggest challenge right now" name="biggestChallenge" value={data.biggestChallenge} onChange={set} multi={false} options={["Missing too many calls","Inbox overload","Can't scale without more staff","Admin taking too much time","Losing leads to competitors","Cash flow / late payments"]}/>
        <Chips label="Monthly budget for tools" name="budget" value={data.budget} onChange={set} multi={false} options={[{value:"under-200",label:"Under $200/mo"},{value:"200-400",label:"$200–$400/mo"},{value:"400-800",label:"$400–$800/mo"},{value:"800+",label:"$800+/mo"}]}/>
        <Chips label="When do you want to start?" name="timeline" value={data.timeline} onChange={set} multi={false} options={["Immediately","Within a month","Just exploring","When budget allows"]}/>
        <TA label="Anything else you'd like us to know?" name="notes" value={data.notes} onChange={set} placeholder="Optional — any specific goals, concerns, or context…"/>
      </div>,
    ];

    const progress = Math.round(((step+1)/STEPS.length)*100);

    return (
      <div className="min-h-screen bg-gray-50">
        {/* Nav */}
        <nav className="fixed top-0 left-0 right-0 z-50 border-b border-gray-200 bg-white/95 backdrop-blur-sm">
          <div className="max-w-2xl mx-auto px-6 py-3.5 flex items-center justify-between">
            <a href="otw_homepage.html" className="flex flex-col leading-tight">
              <span className="text-sm font-semibold text-gray-900">OTW Studios</span>
              <span className="text-[10px] text-gray-400">Free Business Audit</span>
            </a>
            <span className="text-xs text-gray-400">Step {step+1} of {STEPS.length}</span>
          </div>
        </nav>

        <div className="max-w-2xl mx-auto px-6 pb-20" style={{paddingTop:"88px"}}>
          {/* Progress */}
          <div className="mb-8">
            <div className="h-1 bg-gray-100 rounded-full overflow-hidden mb-4">
              <div className="h-full bg-gold-500 rounded-full progress-fill" style={{width:`${progress}%`}}/>
            </div>
            <div className="flex gap-1.5 flex-wrap">
              {STEPS.map((s,i)=>(
                <button key={i} onClick={()=>i<step&&setStep(i)} disabled={i>=step}
                  className={`flex items-center gap-1.5 rounded-full px-3.5 py-1.5 text-xs font-medium transition-all ${i===step?"bg-amber-50 border border-amber-400 text-amber-600":i<step?"border border-gray-200 text-gray-400 hover:text-gray-600 cursor-pointer":"border border-gray-100 text-gray-300 cursor-default"}`}>
                  {s.icon}{s.label}
                </button>
              ))}
            </div>
          </div>

          {/* Step header */}
          <div className="mb-6">
            <div className="text-xs font-semibold uppercase tracking-widest text-gold-600 mb-2">{STEPS[step].label}</div>
            <h2 className="text-2xl font-bold text-gray-900">
              {["Tell us about your business","How does your team operate?","How do you handle calls?","How do you manage email?","How do you schedule jobs?","What tools do you use?","What are your goals?"][step]}
            </h2>
          </div>

          {/* Step content */}
          {stepViews[step]}

          {/* Nav buttons */}
          <div className="flex gap-3 mt-8">
            {step > 0 && (
              <button onClick={()=>setStep(s=>s-1)}
                className="btn-ghost flex-1 rounded-full border border-gray-200 px-5 py-3 text-sm font-medium text-gray-400">
                <span>← Back</span>
              </button>
            )}
            {step < STEPS.length-1 ? (
              <button onClick={()=>canNext()&&setStep(s=>s+1)} disabled={!canNext()}
                className={`btn-gold flex-1 rounded-full px-5 py-3 text-sm font-semibold text-white ${canNext()?"bg-gold-500":"bg-gray-200 text-gray-400 cursor-not-allowed"}`}>
                Continue <IChevR cls="inline h-4 w-4"/>
              </button>
            ) : (
              <button onClick={()=>onComplete(data)}
                className="btn-gold flex-1 rounded-full bg-gold-500 px-5 py-3 text-sm font-semibold text-white">
                Generate My Free Report →
              </button>
            )}
          </div>

          {step===0 && (
            <p className="mt-5 text-center text-[10px] text-gray-400 leading-5">
              Takes ~3 minutes. No credit card. No spam.<br/>Your personalised workflow report appears instantly.
            </p>
          )}
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════════════════════════════
     EMAIL AUTOMATION — EmailJS (client-side, no backend)
     Setup guide: https://emailjs.com
     STEP 1: Sign up at emailjs.com (free — 200 emails/month)
     STEP 2: Add Email Service (Gmail) → copy Service ID below
     STEP 3: Create Template "otw_admin_notify" with these vars:
       {{owner_name}}, {{business_name}}, {{lead_email}},
       {{lead_phone}}, {{trade}}, {{location}},
       {{overall_score}}, {{phone_score}}, {{email_score}},
       {{scheduling_score}}, {{total_cost}}, {{main_interests}},
       {{product_recs}}, {{budget}}, {{timeline}}, {{notes}}
     STEP 4: Create Template "otw_client_report" with these vars:
       {{to_email}}, {{owner_name}}, {{business_name}},
       {{overall_score}}, {{total_cost}}, {{main_interests}},
       {{recommended_product}}, {{recommended_tier}}
     STEP 5: Account > API Keys → copy Public Key below
     ══════════════════════════════════════════════════════════ */

  const EMAILJS_PUBLIC_KEY   = "YOUR_PUBLIC_KEY";          // ← replace
  const EMAILJS_SERVICE_ID   = "YOUR_SERVICE_ID";          // ← replace
  const EMAILJS_ADMIN_TPL    = "otw_admin_notify";
  const EMAILJS_CLIENT_TPL   = "otw_client_report";
  const ADMIN_EMAIL          = "andy@otwstudios.com.au";

  async function sendEmails(audit, formData) {
    if (typeof emailjs === "undefined") throw new Error("EmailJS not loaded");
    emailjs.init(EMAILJS_PUBLIC_KEY);

    const scoreAreas = [
      { label:"Phone & Calls",   score:audit.scores.phones },
      { label:"Email & Admin",   score:audit.scores.email },
      { label:"Scheduling",      score:audit.scores.scheduling },
      { label:"Admin Tools",     score:audit.scores.admin },
    ].sort((a,b) => a.score - b.score);
    const mainInterests = scoreAreas.slice(0,2).map(x=>`${x.label} (score: ${x.score})`).join(", ");

    const productRecs = audit.recs.map(r =>
      `${r.product} — ${r.tier} tier\nReason: ${r.reason}\nEstimated saving: $${r.roi.saving.toLocaleString()}/mo`
    ).join("\n\n---\n\n");

    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_ADMIN_TPL, {
      to_email:          ADMIN_EMAIL,
      owner_name:        formData.ownerName    || "Unknown",
      business_name:     formData.businessName || "Unknown",
      lead_email:        formData.email        || "Not provided",
      lead_phone:        formData.phone        || "Not provided",
      trade:             formData.trade        || "Not specified",
      location:          formData.location     || "Not specified",
      overall_score:     audit.scores.overall,
      phone_score:       audit.scores.phones,
      email_score:       audit.scores.email,
      scheduling_score:  audit.scores.scheduling,
      total_cost:        `$${audit.totalCost.toLocaleString()}`,
      main_interests:    mainInterests,
      product_recs:      productRecs,
      budget:            formData.budget    || "Not specified",
      timeline:          formData.timeline  || "Not specified",
      notes:             formData.notes     || "None",
    });

    if (formData.email) {
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_CLIENT_TPL, {
        to_email:            formData.email,
        owner_name:          formData.ownerName    || "there",
        business_name:       formData.businessName || "your business",
        overall_score:       audit.scores.overall,
        total_cost:          `$${audit.totalCost.toLocaleString()}`,
        main_interests:      scoreAreas.slice(0,2).map(x=>x.label).join(" and "),
        recommended_product: audit.recs[0]?.product || "AI Receptionist",
        recommended_tier:    audit.recs[0]?.tier    || "Full Service",
      });
    }

    /* ══════════════════════════════════════════════════════════
       TODO: 7-DAY FOLLOW-UP EMAIL (requires n8n — deferred)
       Architecture: On audit complete → POST to n8n webhook →
         n8n waits 7 days → sends follow-up email via SMTP/Gmail.
       Draft subject: "Quick question about your OTW audit, [name]"
       Draft body:
         Hi [name], Just touching base to see if you had any
         questions after going through your business audit last week.
         We identified you could be recovering up to $[totalCost]/month.
         Setup takes 48 hours and we handle everything.
         Worth a quick 15-minute call? [Book a call → calendly link]
         Cheers, Andy — OTW Studios
       NOTE: CTA copy needs optimising for high conversion before launch.
       n8n fields: email, ownerName, businessName, totalCost,
         recommendedProduct, auditDate
       ══════════════════════════════════════════════════════════ */
  }

  /* ── APP ── */
  function App() {
    const [formData, setFormData] = useState(null);
    const [audit, setAudit] = useState(null);

    const handleComplete = (data) => {
      setFormData(data);
      setAudit(calculateAudit(data));
    };
    const handleBack = () => { setAudit(null); };

    if (audit) return <Report audit={audit} formData={formData} onBack={handleBack}/>;
    return <AuditForm onComplete={handleComplete}/>;
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
