<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Free Workflow Audit — OTW Studios</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif;}
    html{scroll-behavior:smooth;}
    body{background:#f8fafc;color:#0f172a;min-height:100vh;}

    input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:#e2e8f0;outline:none;cursor:pointer;}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#F59E0B;cursor:pointer;box-shadow:0 0 0 4px rgba(245,158,11,0.18);}
    input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#F59E0B;cursor:pointer;border:none;}

    .inp{background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:14px 18px;color:#0f172a;font-size:15px;width:100%;outline:none;transition:border-color 0.2s;}
    .inp:focus{border-color:rgba(245,158,11,0.55);}
    .inp::placeholder{color:#94a3b8;}
    select.inp option{background:#fff;color:#0f172a;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
    @keyframes countUp{from{opacity:0;transform:scale(0.85);}to{opacity:1;transform:scale(1);}}
    @keyframes slideIn{from{opacity:0;transform:translateX(-16px);}to{opacity:1;transform:translateX(0);}}
    @keyframes redGlow{0%,100%{box-shadow:0 0 24px rgba(239,68,68,0.12);}50%{box-shadow:0 0 48px rgba(239,68,68,0.22);}}

    .fade-up{animation:fadeUp 0.4s ease forwards;}
    /* ── Products mega-menu (matches other pages) ── */
    .prod-dropdown { position: relative; }
    .prod-menu {
      visibility: hidden; opacity: 0;
      transform: translateX(-50%) translateY(8px);
      transition: opacity 0.18s ease, transform 0.18s ease, visibility 0s 0.18s;
      position: absolute; top: calc(100% + 14px); left: 50%;
      z-index: 300; min-width: 480px;
    }
    .prod-dropdown:hover .prod-menu {
      visibility: visible; opacity: 1;
      transform: translateX(-50%) translateY(0);
      transition: opacity 0.18s ease, transform 0.18s ease, visibility 0s;
    }
    .prod-panel {
      background: #fff; border-radius: 20px;
      box-shadow: 0 4px 6px -4px rgba(0,0,0,0.22), 0 10px 15px -3px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.06);
      padding: 18px;
    }
    .prod-slabel { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.12em; color:#94a3b8; padding:0 10px 8px; }
    .prod-item { display:flex; align-items:flex-start; gap:11px; padding:10px; border-radius:10px; text-decoration:none; transition:background 0.15s ease; color:inherit; }
    .prod-item:hover { background:#f9fafb; }
    .prod-icon-box { flex-shrink:0; display:flex; align-items:center; justify-content:center; width:40px; height:40px; border:1px solid #e5e7eb; border-radius:10px; box-shadow:inset 0 -2px 2px rgba(0,0,0,0.05); color:#64748b; background:#fff; }
    .prod-icon-sm { width:32px; height:32px; border-radius:8px; }
    .prod-title { font-size:13px; font-weight:600; color:#1e293b; line-height:1.3; }
    .prod-desc  { font-size:11.5px; color:#94a3b8; line-height:1.4; margin-top:2px; }
    .prod-badge { display:inline-block; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; padding:2px 7px; border-radius:20px; margin-top:4px; }
    .prod-badge-live { background:#ecfdf5; color:#059669; }
    .prod-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:3px; }
    .prod-grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:3px; }
    .prod-divider { border-top:1px solid #f1f5f9; margin:12px 0 10px; }
    .count-up{animation:countUp 0.6s ease forwards;}
    .slide-in{animation:slideIn 0.3s ease forwards;}
    .red-glow{animation:redGlow 2.5s ease-in-out infinite;}

    .progress-track{background:#e2e8f0;border-radius:4px;height:4px;overflow:hidden;}
    .progress-fill{height:100%;background:linear-gradient(90deg,#F59E0B,#FCD34D);border-radius:4px;transition:width 0.5s ease;}

    .flow-node{border-radius:10px;padding:10px 14px;text-align:center;font-size:11px;font-weight:600;line-height:1.4;}
    .flow-node.neutral{background:#f8fafc;border:1px solid #e2e8f0;color:#64748b;}
    .flow-node.bad{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.22);color:#ef4444;}
    .flow-node.good{background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.28);color:#b45309;}
    .flow-node.lost{background:rgba(239,68,68,0.10);border:1px solid rgba(239,68,68,0.35);color:#ef4444;font-weight:700;}
    .flow-node.captured{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.35);color:#16a34a;font-weight:700;}
    .flow-arrow{text-align:center;font-size:16px;color:#cbd5e1;padding:2px 0;}
    .flow-arrow.gold{color:rgba(245,158,11,0.45);}

    .pain-pill{display:flex;align-items:flex-start;gap:12px;background:rgba(239,68,68,0.04);border:1px solid rgba(239,68,68,0.15);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
    .fix-pill{display:flex;align-items:flex-start;gap:12px;background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.18);border-radius:12px;padding:14px 16px;margin-bottom:10px;}

    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:2px;}

    /* Dark-panel range slider override */
    .dark-slider{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:2px;outline:none;cursor:pointer;border:none;}
    .dark-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#F59E0B;cursor:pointer;box-shadow:0 0 0 4px rgba(245,158,11,0.22);border:2px solid #fff;}
    .dark-slider::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#F59E0B;cursor:pointer;border:2px solid #fff;}

    /* ── Calculator layout ── */
    .calc-wrap{display:grid;grid-template-columns:1fr 380px;gap:0;border-radius:20px;overflow:hidden;box-shadow:0 12px 60px rgba(0,0,0,0.22),0 0 0 1px rgba(255,255,255,0.06);}
    @media(max-width:860px){.calc-wrap{grid-template-columns:1fr;}}
    /* Left panel — dark navy brand colour */
    .calc-left{background:#0A0F1E;padding:32px 28px;overflow-y:auto;max-height:90vh;border-right:1px solid rgba(255,255,255,0.07);}
    @media(max-width:860px){.calc-left{max-height:none;border-right:none;border-bottom:1px solid rgba(255,255,255,0.07);}}
    /* Right panel — white card with gold accent stripe */
    .calc-right{background:#ffffff;padding:32px 24px;display:flex;flex-direction:column;border-top:4px solid #F59E0B;}
    /* Section headers */
    .calc-section-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px;margin-top:22px;padding-top:18px;border-top:1px solid rgba(255,255,255,0.08);}
    .calc-section-hd:first-of-type{margin-top:0;padding-top:0;border-top:none;}
    .calc-section-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(245,158,11,0.14);border:1px solid rgba(245,158,11,0.3);}
    .calc-section-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.13em;color:#F59E0B;}
    .loss-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.05);}
    .loss-row:last-of-type{border-bottom:none;}
    .saving-card{background:#F2F5FA;border:1px solid rgba(0,0,0,0.07);border-radius:12px;padding:14px;margin-bottom:8px;}
    /* Dark-bg range slider for left panel */
    .calc-left input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;outline:none;cursor:pointer;background:rgba(255,255,255,0.12);}
    .calc-left input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#F59E0B;cursor:pointer;box-shadow:0 0 0 4px rgba(245,158,11,0.22);border:2px solid #0A0F1E;}
    .calc-left input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#F59E0B;cursor:pointer;border:2px solid #0A0F1E;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const CALENDLY_URL        = "https://calendly.com/YOUR_LINK_HERE";
const EMAILJS_PUBLIC_KEY  = "YOUR_PUBLIC_KEY";
const EMAILJS_SERVICE_ID  = "YOUR_SERVICE_ID";
const EMAILJS_TEMPLATE_ID = "YOUR_TEMPLATE_ID";

function fmt(n) { return '$' + Math.round(n).toLocaleString('en-AU'); }

function calcLoss(d) {
  const missedRev = (d.missedCalls||0) * 4.3 * (d.avgJobValue||0) * 0.38;
  const quoteRev  = (d.deadQuotes||0)  * 4.3 * (d.avgJobValue||0) * 0.55;
  const adminCost = (d.adminHours||0)  * 4.3 * 75;
  const total     = Math.round(missedRev + quoteRev + adminCost);
  return {
    missedRev: Math.round(missedRev),
    quoteRev:  Math.round(quoteRev),
    adminCost: Math.round(adminCost),
    total,
    annual:    total * 12,
    missedCallsPerMonth: Math.round((d.missedCalls||0) * 4.3),
    coldQuotesPerMonth:  Math.round((d.deadQuotes||0)  * 4.3),
    adminHrsPerMonth:    Math.round((d.adminHours||0)  * 4.3),
  };
}

// ── ANIMATED COUNTER ─────────────────────────────────
function AnimCounter({ value, color='#EF4444', size=22 }) {
  const [display, setDisplay] = useState(0);
  const prev = useRef(0);
  useEffect(() => {
    const start = prev.current, end = value, dur = 700, t0 = Date.now();
    const step = () => {
      const p = Math.min((Date.now()-t0)/dur, 1);
      const e = 1 - Math.pow(1-p, 3);
      setDisplay(Math.round(start + (end-start)*e));
      if (p < 1) requestAnimationFrame(step); else prev.current = end;
    };
    requestAnimationFrame(step);
  }, [value]);
  return <span style={{fontSize:size, fontWeight:900, color, letterSpacing:'-0.02em'}}>{fmt(display)}</span>;
}

// ── FLOATING TICKER ──────────────────────────────────
function Ticker({ amount }) {
  const [disp, setDisp] = useState(0);
  const prev = useRef(0);
  useEffect(() => {
    const start=prev.current, end=amount, dur=600, t0=Date.now();
    const step=()=>{
      const p=Math.min((Date.now()-t0)/dur,1), e=1-Math.pow(1-p,3);
      setDisp(Math.round(start+(end-start)*e));
      if(p<1) requestAnimationFrame(step); else prev.current=end;
    };
    requestAnimationFrame(step);
  }, [amount]);
  if (!amount) return null;
  return (
    <div style={{
      position:'fixed',top:72,right:16,zIndex:300,
      background:'#fff',backdropFilter:'blur(12px)',
      border:'1.5px solid rgba(239,68,68,0.3)',borderRadius:14,
      padding:'10px 16px',boxShadow:'0 4px 24px rgba(0,0,0,0.08)',
    }}>
      <div style={{fontSize:9,fontWeight:800,color:'rgba(239,68,68,0.6)',textTransform:'uppercase',letterSpacing:'0.12em',marginBottom:2}}>Monthly leak</div>
      <div style={{fontSize:20,fontWeight:900,color:'#EF4444',letterSpacing:'-0.02em'}}>{fmt(disp)}</div>
    </div>
  );
}

// ── SLIDER ───────────────────────────────────────────
function Slider({ label, hint, value, min, max, step=1, onChange, display }) {
  return (
    <div style={{marginBottom:32}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:12}}>
        <div>
          <div style={{fontSize:14,fontWeight:600,color:'rgba(255,255,255,0.85)'}}>{label}</div>
          {hint && <div style={{fontSize:11,color:'rgba(255,255,255,0.38)',marginTop:2}}>{hint}</div>}
        </div>
        <div style={{fontSize:26,fontWeight:900,color:'#F59E0B',letterSpacing:'-0.02em',flexShrink:0,marginLeft:16}}>
          {display !== undefined ? display : value}
        </div>
      </div>
      <input type="range" min={min} max={max} step={step} value={value}
        onChange={e => onChange(Number(e.target.value))}/>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:6,fontSize:10,color:'rgba(255,255,255,0.22)'}}>
        <span>{min}</span><span>{max}</span>
      </div>
    </div>
  );
}

// ── NAV ──────────────────────────────────────────────
function Nav({ step, total }) {

      </a>

      {/* Products mega-menu */}
      <div className="prod-dropdown" style={{display:'flex',alignItems:'center',paddingTop:12,paddingBottom:12}}>
        <button style={{display:'flex',alignItems:'center',gap:5,fontSize:13,fontWeight:600,color:'#475569',background:'none',border:'none',cursor:'pointer'}}>
          Products
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div className="prod-menu">
          <div className="prod-panel">
            <div className="prod-slabel">Products</div>
            <div className="prod-grid2">
              <a href="otw_ai_receptionist.html" className="prod-item">
                <div className="prod-icon-box">
                  <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 014.69 11a19.79 19.79 0 01-3.07-8.67A2 2 0 013.6 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L7.91 8.09a16 16 0 006 6l1.46-1.45a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92z"/></svg>
                </div>
                <div>
                  <div className="prod-title">OTW Receptionist</div>
                  <div className="prod-desc">AI that answers calls &amp; books jobs 24/7</div>
                  <span className="prod-badge prod-badge-live">Live</span>
                </div>
              </a>
              <a href="otw_triageai.html" className="prod-item">
                <div className="prod-icon-box">
                  <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/></svg>

                  <span className="prod-badge prod-badge-live">Live</span>
                </div>
              </a>
            </div>
            <div className="prod-divider"></div>
            <div className="prod-slabel">Coming Soon</div>
            <div className="prod-grid3">
              <div className="prod-item" style={{opacity:0.45,cursor:'default'}}>
                <div className="prod-icon-box prod-icon-sm"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
                <div><div className="prod-title" style={{fontSize:'12px'}}>Scheduling</div><div className="prod-desc">Smart booking</div></div>
              </div>
              <div className="prod-item" style={{opacity:0.45,cursor:'default'}}>
                <div className="prod-icon-box prod-icon-sm"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div>
                <div><div className="prod-title" style={{fontSize:'12px'}}>DebtCollector</div><div className="prod-desc">Chase invoices</div></div>
              </div>
              <div className="prod-item" style={{opacity:0.45,cursor:'default'}}>
                <div className="prod-icon-box prod-icon-sm"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
                <div><div className="prod-title" style={{fontSize:'12px'}}>ReviewGenius</div><div className="prod-desc">Auto-collect reviews</div></div>

      {step > 0 && step <= total

        : <a href="index.html" style={{fontSize:12,fontWeight:600,color:'#94a3b8',textDecoration:'none'}}>← Back to home</a>

}

// ── BTN ──────────────────────────────────────────────
function Btn({ onClick, children, disabled=false, ghost=false }) {
  return (
    <button onClick={onClick} disabled={disabled} style={{
      flex: ghost ? 1 : 2,
      background: ghost ? '#fff' : disabled ? 'rgba(245,158,11,0.25)' : '#F59E0B',
      border: ghost ? '1.5px solid #e2e8f0' : 'none',
      borderRadius: 50, padding: '15px',
      fontWeight: 800, fontSize: 14,
      color: ghost ? '#64748b' : disabled ? '#fff' : '#fff',
      cursor: disabled ? 'not-allowed' : 'pointer', transition: 'all 0.2s',
      fontFamily: 'Inter',
    }}>{children}</button>
  );
}

// ── INLINE LOSS CALLOUT ───────────────────────────────
function LossCallout({ amount, label }) {
  if (!amount) return null;
  return (
    <div className="slide-in" style={{
      background:'#fff',border:'1.5px solid rgba(239,68,68,0.2)',
      borderRadius:14,padding:'16px 20px',marginBottom:28,
      boxShadow:'0 2px 12px rgba(239,68,68,0.07)',
    }}>
      <div style={{fontSize:11,fontWeight:700,color:'rgba(239,68,68,0.55)',marginBottom:4}}>{label}</div>
      <div style={{fontSize:24,fontWeight:900,color:'#EF4444',letterSpacing:'-0.02em'}}>{fmt(amount)}<span style={{fontSize:13,fontWeight:500,color:'rgba(239,68,68,0.4)'}}>/month</span></div>
    </div>
  );
}

// ── WORKFLOW DIAGRAM ─────────────────────────────────
function WorkflowDiagram({ loss, data }) {
  const GOLD='#F59E0B', RED='#EF4444', TEAL='#0d9488';
  const C = { tri:100, cur:310, sch:520, otw:770, orc:980, out:1180 };
  const RW = { top:155, mid:320, bot:485 };
  const NR = 48;
  const F = {fontFamily:'Inter,sans-serif'};

  // SVG icon helper — renders a Feather-style icon centered at (cx,cy)
  // paths are written in 24×24 space; we translate+scale to fit inside the node
  const sc = 1.6, off = (24*sc)/2;
  function icon(cx, cy, children) {
    return (
      <g transform={`translate(${cx-off},${cy-off}) scale(${sc})`}
         fill="none" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
        {children}
      </g>
    );
  }

  return (
    <div style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:20,padding:'24px 16px 20px',marginBottom:32,overflow:'hidden',boxShadow:'0 2px 20px rgba(0,0,0,0.06)'}}>
      <div style={{fontSize:10,fontWeight:800,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.14em',marginBottom:16,paddingLeft:4}}>Your workflow — before vs after OTW</div>
      <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
        <svg viewBox="0 0 1290 610" style={{width:'100%',minWidth:720,height:'auto',display:'block'}}>
          <defs>
            <pattern id="wf-dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
              <circle cx="1" cy="1" r="1.2" fill="#e2e8f0"/>
            </pattern>
            <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
              <path d="M0,0 L0,6 L8,3 z" fill="#EF4444" opacity="0.55"/>
            </marker>
            <marker id="arr-gold" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">

function DSlider({ label, hint, value, min, max, step=1, onChange, display }) {
  const pct = ((value - min) / (max - min)) * 100;
  return (
    <div style={{marginBottom:20}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
        <div>
          <div style={{fontSize:13,fontWeight:600,color:'rgba(255,255,255,0.85)',lineHeight:1.3}}>{label}</div>
          {hint && <div style={{fontSize:11,color:'rgba(255,255,255,0.38)',marginTop:2}}>{hint}</div>}
        </div>
        <div style={{fontSize:15,fontWeight:800,color:'#F59E0B',minWidth:80,textAlign:'right',flexShrink:0}}>{display}</div>
      </div>
      <input type="range" min={min} max={max} step={step} value={value}
        onChange={e=>onChange(Number(e.target.value))}

    // Scheduling — time on road

  });
  const sc = (k,v) => setC(p=>({...p,[k]:v}));

  const OTW_PRO = 499;

  // What they're LOSING each month
  const callsPerMonth   = Math.round(c.callsPerWeek * 4.3);
  const missedPerMonth  = Math.round(callsPerMonth * c.missedPct / 100);
  const missedRevLoss   = Math.round(missedPerMonth * c.jobValue * 0.42);
  const emailWasteLoss  = Math.round(c.emailHrsPerWeek * 4.3 * c.billingRate * 0.65);
  const reviewLoss      = c.currentReviews < 40 ? Math.round(c.jobsPerWeek * 4.3 * c.jobValue * 0.11) : Math.round(c.jobsPerWeek * 4.3 * c.jobValue * 0.04);
  const debtLoss        = Math.round(c.overduePerMonth * c.invoiceValue * 0.18);
  const roadTimeLoss    = Math.round(c.roadHrsPerDay * 22 * c.billingRate * 0.4);

            <div style={{
              background:'rgba(245,158,11,0.05)',border:'1.5px solid rgba(245,158,11,0.18)',
              borderRadius:16,padding:'18px',textAlign:'center',marginBottom:24,
            }}>
              <div style={{fontSize:10,fontWeight:800,color:'rgba(245,158,11,0.5)',textTransform:'uppercase',letterSpacing:'0.14em',marginBottom:6}}>Recoverable annual revenue with OTW Pro</div>
              <div style={{fontSize:44,fontWeight:900,color:'#F59E0B',letterSpacing:'-0.035em'}}>{fmt(loss.annual)}</div>
              <div style={{fontSize:12,color:'#94a3b8',marginTop:4}}>at $499/month — yours to recover</div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:14,marginBottom:24}}>
              <div>
                <label style={{display:'block',fontSize:11,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:7}}>Email address</label>
                <input className="inp" type="email" placeholder="dave@morrisonplumbing.com.au" value={data.email}
                  onChange={e=>set('email',e.target.value)}/>
              </div>
              <div>
                <label style={{display:'block',fontSize:11,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:7}}>Phone number</label>
                <input className="inp" type="tel" placeholder="0412 345 678" value={data.phone}
                  onChange={e=>set('phone',e.target.value)}/>
              </div>
            </div>
            <p style={{fontSize:11,color:'#94a3b8',marginBottom:20,textAlign:'center'}}>No spam. Andy uses this to personalise your report and set up your free 30-day Pro trial.</p>
            <div style={{display:'flex',gap:10}}>
              <Btn onClick={back} ghost>← Back</Btn>
              <Btn onClick={submit} disabled={!data.email}>Show me my full report →</Btn>
            </div>
          </div>
        )}

        {/* ── RESULTS ── */}
        {step === 4 && <Results data={data} loss={loss}/>}

      </div>

      <div style={{textAlign:'center',padding:'16px 24px 36px',borderTop:'1px solid #e2e8f0'}}>
        <span style={{fontSize:10,fontWeight:500,color:'#cbd5e1'}}>Powered by OTW Studios</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
