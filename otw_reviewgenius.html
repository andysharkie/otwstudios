<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OTW ReviewGenius — Turn completed jobs into 5-star reviews | OTW Studios</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: {
          navy: { 950:'#04080F', 900:'#0A0F1E', 800:'#0F1629' },
          gold: { 300:'#FDE68A', 400:'#FCD34D', 500:'#F59E0B', 600:'#D97706', 700:'#B45309' }
        },
        fontFamily: { sans:['Inter','system-ui','sans-serif'] }
      }}
    }
  </script>
  <style>
    * { font-family:'Inter',system-ui,sans-serif; }
    html { scroll-behavior:smooth; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation: fadeUp 0.55s ease forwards; }
    input:focus,textarea:focus { outline:none; }
    .gold-glow { box-shadow: 0 0 32px rgba(245,158,11,0.2); }
  </style>
</head>
<body class="bg-white text-slate-900 antialiased">
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

function App() {
  const [form, setForm] = useState({ name:'', email:'', business:'' });
  const [sent, setSent] = useState(false);
  const [error, setError] = useState('');

  function handleSubmit(e) {
    e.preventDefault();
    if (!form.name || !form.email) { setError('Please enter your name and email.'); return; }
    setSent(true);
  }

  const benefits = [
    {
      icon: (
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
        </svg>
      ),
      title: 'Reviews that actually happen',
      body: 'Most satisfied customers never leave a review because nobody asks. ReviewGenius sends the request the moment a job closes — when your work is still fresh and the customer is happiest.',
    },
    {
      icon: (
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      ),
      title: 'In your voice, to the right platform',
      body: 'Messages are written in your tone and directed to where your reviews matter most — Google, Facebook, or others. The right ask, at the right time, on the right platform.',
    },
    {
      icon: (
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      ),
      title: 'Your reputation compounds',
      body: 'More reviews means higher local search ranking, more inbound calls, and a full calendar — without spending a dollar on ads. Every completed job starts working harder for you.',
    },
  ];

  const features = [
    'Automated review requests triggered on job close',
    'Smart timing — sent when response rates peak',
    'Multi-platform: Google, Facebook, and more',
    'Message personalised to job type and customer',
    'Written in your business voice — not a template',
    'Review monitoring and alert for new responses',
    'Monthly reputation report with trend analysis',
    'Fully configured and managed by OTW',
  ];

  return (
    <div className="min-h-screen bg-white">

      {/* NAV */}
      <header className="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur border-b border-slate-200 shadow-sm">
        <div className="mx-auto max-w-7xl px-6 py-4 flex items-center justify-between">
          <a href="index.html" className="flex flex-col leading-tight">
            <span className="text-base font-bold tracking-tight text-slate-900">OTW Studios</span>
            <span className="text-[10px] font-700 uppercase tracking-widest text-slate-400">Optimise The Workflow</span>
          </a>
          <a href="otw_audit.html" className="rounded-full bg-gold-500 px-5 py-2.5 text-sm font-semibold text-white hover:bg-gold-600 transition-colors shadow-sm">
            Start free audit
          </a>
        </div>
      </header>

      <main>
        {/* HERO */}
        <section className="pt-32 pb-20 bg-white">
          <div className="mx-auto max-w-3xl px-6">
            <div className="mb-7 inline-flex items-center gap-2.5 rounded-full border border-slate-200 bg-slate-50 px-4 py-2">
              <span className="h-2 w-2 rounded-full bg-amber-400" style={{animation:'pulse 2s ease infinite'}}/>
              <span className="text-xs font-bold uppercase tracking-widest text-slate-400">In Development</span>
            </div>

            <h1 className="text-5xl font-extrabold tracking-tight text-slate-950 leading-[1.06] sm:text-6xl fade-up">
              OTW ReviewGenius
            </h1>
            <p className="mt-4 text-xl font-semibold text-gold-600 fade-up" style={{animationDelay:'0.08s'}}>
              Turn completed jobs into 5-star reviews — automatically.
            </p>
            <p className="mt-6 text-base leading-8 text-slate-500 max-w-2xl fade-up" style={{animationDelay:'0.14s'}}>
              After every job closes, ReviewGenius sends a personalised follow-up to your customer at exactly the right moment. No manual messages, no chasing — just a steady stream of reviews building your reputation while you focus on the next job.
            </p>
            <p className="mt-4 text-base leading-8 text-slate-500 max-w-2xl fade-up" style={{animationDelay:'0.18s'}}>
              For trade businesses, your online rating is your marketing. ReviewGenius makes sure every happy customer you serve becomes a review that wins you the next one.
            </p>
          </div>
        </section>

        {/* BENEFITS */}
        <section className="bg-slate-50 py-16 border-t border-slate-200">
          <div className="mx-auto max-w-5xl px-6">
            <p className="text-xs font-bold uppercase tracking-widest text-gold-600 mb-8">What it does</p>
            <div className="grid gap-8 md:grid-cols-3">
              {benefits.map((b, i) => (
                <div key={i} className="bg-white rounded-2xl p-7 border border-slate-200 shadow-sm">
                  <div className="h-10 w-10 rounded-xl bg-gold-500/10 flex items-center justify-center text-gold-600 mb-5">
                    {b.icon}
                  </div>
                  <h3 className="text-base font-bold text-slate-900 mb-2">{b.title}</h3>
                  <p className="text-sm leading-6 text-slate-500">{b.body}</p>
                </div>
              ))}
            </div>
          </div>
        </section>

        {/* SOCIAL PROOF STAT */}
        <section className="py-14 bg-white border-t border-slate-200">
          <div className="mx-auto max-w-3xl px-6">
            <div className="rounded-2xl bg-slate-50 border border-slate-200 p-8">
              <div className="flex gap-1 mb-4">
                {[1,2,3,4,5].map(i => (
                  <svg key={i} width="18" height="18" viewBox="0 0 24 24" fill="#F59E0B" stroke="none"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
                ))}
              </div>
              <p className="text-base text-slate-600 leading-7 italic mb-4">
                "73% of consumers say positive reviews make them trust a local business more. Businesses with 50+ reviews earn 4.6× more revenue than those with fewer than 10."
              </p>
              <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider">BrightLocal Local Consumer Review Survey</p>
            </div>
          </div>
        </section>

        {/* FEATURES — GREYED OUT */}
        <section className="py-16 bg-slate-50 border-t border-slate-200">
          <div className="mx-auto max-w-3xl px-6">
            <div className="relative">
              <div className="absolute inset-0 z-10 flex flex-col items-center justify-center rounded-2xl"
                style={{background:'rgba(248,250,252,0.85)',backdropFilter:'blur(3px)'}}>
                <div className="flex items-center gap-2 rounded-full border border-slate-200 bg-white px-4 py-2 shadow-sm">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                  </svg>
                  <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Coming Soon</span>
                </div>
                <p className="mt-3 text-xs text-slate-400 text-center max-w-xs">Full feature set unlocks at launch.<br/>Register below to be first in line.</p>
              </div>

              <div className="rounded-2xl border border-slate-200 bg-white p-8 select-none" style={{filter:'blur(1.5px)',opacity:0.45}}>
                <p className="text-xs font-bold uppercase tracking-widest text-slate-400 mb-5">Full feature list</p>
                <div className="grid gap-3 sm:grid-cols-2">
                  {features.map((f, i) => (
                    <div key={i} className="flex items-center gap-3">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                        <polyline points="20,6 9,17 4,12"/>
                      </svg>
                      <span className="text-sm text-slate-600">{f}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </section>

        {/* INTEREST FORM */}
        <section className="py-20 bg-white border-t border-slate-200">
          <div className="mx-auto max-w-xl px-6">
            {sent ? (
              <div className="rounded-2xl border border-gold-500/30 bg-gold-500/5 p-10 text-center gold-glow">
                <div className="mx-auto mb-5 flex h-14 w-14 items-center justify-center rounded-full bg-gold-500/15">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <polyline points="20,6 9,17 4,12"/>
                  </svg>
                </div>
                <h3 className="text-xl font-bold text-slate-900 mb-2">You're on the list.</h3>
                <p className="text-sm text-slate-500 leading-6">
                  We'll reach out personally when OTW ReviewGenius is ready — Founding Partner pricing held for early registrants.
                </p>
                <a href="index.html" className="mt-7 inline-block text-xs font-semibold text-gold-600 hover:text-gold-700">
                  ← Back to OTW Studios
                </a>
              </div>
            ) : (
              <div className="rounded-2xl border border-slate-200 bg-white p-9 shadow-sm">
                <p className="text-xs font-bold uppercase tracking-widest text-gold-600 mb-2">Early access</p>
                <h2 className="text-2xl font-extrabold text-slate-900 tracking-tight mb-2">Submit your interest</h2>
                <p className="text-sm text-slate-500 leading-6 mb-8">
                  Andy will reach out personally when OTW ReviewGenius launches. Founding Partner pricing ($497/mo) is held exclusively for businesses that register early.
                </p>

                <form onSubmit={handleSubmit} className="space-y-4">
                  <div>
                    <label className="block text-xs font-semibold text-slate-600 mb-1.5">Your name</label>
                    <input
                      type="text" placeholder="James Mitchell" required
                      value={form.name} onChange={e => setForm({...form, name:e.target.value})}
                      className="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 placeholder-slate-400 focus:border-gold-400 focus:ring-2 focus:ring-gold-500/15 transition-colors"
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-slate-600 mb-1.5">Email address</label>
                    <input
                      type="email" placeholder="james@mitchellplumbing.com.au" required
                      value={form.email} onChange={e => setForm({...form, email:e.target.value})}
                      className="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 placeholder-slate-400 focus:border-gold-400 focus:ring-2 focus:ring-gold-500/15 transition-colors"
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-slate-600 mb-1.5">Business name <span className="text-slate-400 font-normal">(optional)</span></label>
                    <input
                      type="text" placeholder="Mitchell Plumbing"
                      value={form.business} onChange={e => setForm({...form, business:e.target.value})}
                      className="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 placeholder-slate-400 focus:border-gold-400 focus:ring-2 focus:ring-gold-500/15 transition-colors"
                    />
                  </div>
                  {error && <p className="text-xs text-red-500">{error}</p>}
                  <button type="submit"
                    className="w-full rounded-full bg-gold-500 py-3.5 text-sm font-bold text-white hover:bg-gold-600 transition-colors shadow-sm mt-2">
                    Register my interest →
                  </button>
                  <p className="text-center text-xs text-slate-400">No spam. One email when it's ready.</p>
                </form>
              </div>
            )}
          </div>
        </section>
      </main>

      {/* FOOTER */}
      <footer className="border-t border-slate-200 py-10 bg-white">
        <div className="mx-auto max-w-7xl px-6 flex flex-col items-center gap-4 sm:flex-row sm:justify-between">
          <a href="index.html" className="flex flex-col leading-tight">
            <span className="text-sm font-bold text-slate-900">OTW Studios</span>
            <span className="text-[10px] uppercase tracking-widest text-slate-400">Optimise The Workflow</span>
          </a>
          <div className="flex gap-6 text-xs text-slate-400">
            <a href="otw_ai_receptionist.html" className="hover:text-slate-700 transition-colors">AI Receptionist</a>
            <a href="otw_triageai.html" className="hover:text-slate-700 transition-colors">TriageAI</a>
            <a href="otw_audit.html" className="hover:text-slate-700 transition-colors">Free Audit</a>
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
