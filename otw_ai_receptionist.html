<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OTW AI Receptionist — Answer every call. Capture every lead.</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/retell-client-js-sdk@latest/dist/index.umd.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: {
              950: '#04080F',
              900: '#0A0F1E',
              800: '#0F1629',
              700: '#172035',
              600: '#1E2D47',
              500: '#2A3F5F',
            },
            gold: {
              300: '#FDE68A',
              400: '#FCD34D',
              500: '#F59E0B',
              600: '#D97706',
              700: '#B45309',
            }
          },
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', 'Inter', 'Segoe UI', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    html { scroll-behavior: smooth; }

    /* ── SCROLL-TRIGGERED SECTION FADE ── */
    .section-reveal-950,
    .section-reveal-900,
    .section-reveal-800 {
      background-color: #f8fafc;
      transition: background-color 600ms ease;
    }
    .section-reveal-950.is-visible { background-color: #04080F; }
    .section-reveal-900.is-visible { background-color: #0A0F1E; }
    .section-reveal-800.is-visible { background-color: #0F1629; }

    /* ── BUTTON ANIMATIONS ── */
    .btn-gold {
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.22s ease,
                  background-color 0.15s ease;
    }
    .btn-gold:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(245,158,11,0.45);
    }
    .btn-gold:active { transform: translateY(0); transition-duration: 0.08s; }

    .btn-dark {
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.22s ease,
                  background-color 0.15s ease;
    }
    .btn-dark:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }
    .btn-dark:active { transform: translateY(0); transition-duration: 0.08s; }

    .btn-ghost {
      position: relative;
      overflow: hidden;
      transition: color 0.22s ease, border-color 0.22s ease, transform 0.22s ease;
    }
    .btn-ghost::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.08);
      transform: translateY(101%);
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
      border-radius: inherit;
      z-index: 0;
    }
    .btn-ghost > * { position: relative; z-index: 1; }
    .btn-ghost:hover::after { transform: translateY(0); }
    .btn-ghost:hover { border-color: rgba(255,255,255,0.30) !important; color: rgba(255,255,255,0.92) !important; transform: translateY(-1px); }

    .btn-ghost-light { transition: all 0.2s ease; }
    .btn-ghost-light:hover { background-color: #f1f5f9; transform: translateY(-1px); }

    /* ── VOICE DEMO ANIMATIONS ── */
    .gold-glow { box-shadow: 0 0 40px rgba(245, 158, 11, 0.2); }
    .card-dark { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); transition: all 0.2s ease; }
    .card-dark:hover { background: rgba(255,255,255,0.07); border-color: rgba(245,158,11,0.25); }
    @keyframes pulse-ring { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.7); opacity: 0; } }
    @keyframes sound-wave { 0%, 100% { height: 4px; } 50% { height: 20px; } }
    .sound-bar { animation: sound-wave 0.7s ease-in-out infinite; }
    .sound-bar:nth-child(2) { animation-delay: 0.1s; }
    .sound-bar:nth-child(3) { animation-delay: 0.2s; }
    .sound-bar:nth-child(4) { animation-delay: 0.3s; }
    .sound-bar:nth-child(5) { animation-delay: 0.15s; }
    .pulse-ring::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: rgba(245, 158, 11, 0.3);
      animation: pulse-ring 1.4s ease-out infinite;
    }
  </style>
</head>
<body class="bg-white text-slate-900 antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── SVG LINE ART ICONS (Features) ── */
    const Ic = ({ children, cls = "" }) => (
      <svg className={cls} width="22" height="22" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
        {children}
      </svg>
    );
    const IconPhone   = ({ cls }) => <Ic cls={cls}><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.9 10.81a19.79 19.79 0 01-3.07-8.68A2 2 0 012.81 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.25a16 16 0 006.29 6.29l1.61-1.35a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></Ic>;
    const IconCheck   = ({ cls }) => <Ic cls={cls}><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></Ic>;
    const IconBell    = ({ cls }) => <Ic cls={cls}><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></Ic>;
    const IconMsg     = ({ cls }) => <Ic cls={cls}><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></Ic>;
    const IconCal     = ({ cls }) => <Ic cls={cls}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></Ic>;
    const IconChart   = ({ cls }) => <Ic cls={cls}><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></Ic>;

    // Retell web call requires a backend endpoint that calls Retell's /v2/create-web-call API
    // and returns { access_token: "..." }. Set this to your endpoint URL when ready.
    const RETELL_TOKEN_ENDPOINT = "YOUR_TOKEN_ENDPOINT"; // e.g. "/api/retell-token"
    const RETELL_AGENT_ID = "YOUR_RETELL_AGENT_ID"; // from Retell dashboard

    const DEMO_LEAD = {
      caller: "Sarah Thompson", phone: "0412 555 018",
      suburb: "Mount Lawley", issue: "Burst pipe / active leak",
      urgency: "HIGH", status: "Escalated to team",
      nextStep: "Priority callback — team notified",
      notify: "SMS + email sent to Northside Plumbing",
    };

    function SoundWave() {
      return (
        <div className="flex items-center gap-0.5 h-5">
          {[...Array(5)].map((_, i) => (
            <div key={i} className="sound-bar w-1 rounded-full bg-gold-400" style={{ animationDelay: `${i * 0.1}s` }} />
          ))}
        </div>
      );
    }

    function CallTimer({ startTime }) {
      const [elapsed, setElapsed] = useState(0);
      useEffect(() => {
        const t = setInterval(() => setElapsed(Math.floor((Date.now() - startTime) / 1000)), 1000);
        return () => clearInterval(t);
      }, [startTime]);
      const m = Math.floor(elapsed / 60).toString().padStart(2, "0");
      const s = (elapsed % 60).toString().padStart(2, "0");
      return <span className="font-mono text-sm tabular-nums text-white/60">{m}:{s}</span>;
    }

    function VoiceDemo() {
      const retellRef = useRef(null);
      const transcriptRef = useRef(null);
      const [callState, setCallState] = useState("idle");
      const [isSpeaking, setIsSpeaking] = useState(false);
      const [speakerRole, setSpeakerRole] = useState(null);
      const [transcript, setTranscript] = useState([]);
      const [callStartTime, setCallStartTime] = useState(null);

      useEffect(() => {
        if (typeof RetellWebClient !== "undefined") {
          retellRef.current = new RetellWebClient();
          const r = retellRef.current;

          r.on("call_started", () => {
            setCallState("active");
            setCallStartTime(Date.now());
            setTranscript([]);
          });

          r.on("call_ended", () => {
            setCallState("ended");
            setIsSpeaking(false);
            setSpeakerRole(null);
          });

          r.on("agent_start_talking", () => {
            setIsSpeaking(true);
            setSpeakerRole("assistant");
          });

          r.on("agent_stop_talking", () => {
            setIsSpeaking(false);
            setSpeakerRole(null);
          });

          r.on("update", (update) => {
            if (update.transcript && update.transcript.length > 0) {
              const lastMsg = update.transcript[update.transcript.length - 1];
              setSpeakerRole(lastMsg.role === "agent" ? "assistant" : "user");
              setTranscript(update.transcript.map((msg, i) => ({
                role: msg.role === "agent" ? "assistant" : "user",
                text: msg.content,
                id: i,
              })));
            }
          });

          r.on("error", (err) => {
            const msg = err?.message || "";
            if (msg.includes("Permission denied") || msg.includes("NotAllowedError")) {
              setCallState("mic-denied");
            } else {
              setCallState("error");
            }
          });
        }
        return () => { if (retellRef.current) retellRef.current.stopCall(); };
      }, []);

      useEffect(() => {
        if (transcriptRef.current) transcriptRef.current.scrollTop = transcriptRef.current.scrollHeight;
      }, [transcript]);

      const startCall = useCallback(async () => {
        setCallState("connecting");
        setTranscript([]);
        try {
          // Fetch a short-lived web call access token from your backend
          const res = await fetch(RETELL_TOKEN_ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ agent_id: RETELL_AGENT_ID }),
          });
          if (!res.ok) throw new Error("Token endpoint error");
          const { access_token } = await res.json();
          await retellRef.current.startCall({ accessToken: access_token, sampleRate: 24000 });
        } catch (err) {
          console.error("Retell start error:", err);
          setCallState("error");
        }
      }, []);

      const endCall = useCallback(() => {
        if (retellRef.current) retellRef.current.stopCall();
        setCallState("ended");
      }, []);

      const retellReady = typeof RetellWebClient !== "undefined" && RETELL_TOKEN_ENDPOINT !== "YOUR_TOKEN_ENDPOINT";

      return (
        <div className="rounded-3xl border border-white/10 bg-navy-800 overflow-hidden">
          {/* Demo header */}
          <div className="flex items-center justify-between gap-4 border-b border-white/5 px-6 py-4">
            <div>
              <div className="text-sm font-semibold text-white">Live voice demo</div>
              <div className="text-xs text-white/35">Talk to the AI Receptionist · Northside Plumbing</div>
            </div>
            <div className="flex items-center gap-2">
              {callState === "active" && (
                <div className="flex items-center gap-1.5">
                  <span className="relative flex h-2 w-2">
                    <span className="absolute inline-flex h-full w-full animate-ping rounded-full bg-gold-400 opacity-75" />
                    <span className="relative inline-flex h-2 w-2 rounded-full bg-gold-500" />
                  </span>
                  <span className="text-xs font-medium text-gold-400">Live</span>
                </div>
              )}
              <span className="rounded-full border border-white/10 bg-white/5 px-3 py-1 text-xs text-white/30">Demo</span>
            </div>
          </div>

          {/* IDLE */}
          {callState === "idle" && (
            <div className="flex flex-col items-center gap-7 px-6 py-12">
              <div className="text-center">
                <div className="text-lg font-semibold text-white">Call the AI Receptionist</div>
                <p className="mt-2 max-w-sm text-sm text-white/40">Use your microphone for a real conversation. Try asking about a burst pipe, a quote, or your service area.</p>
              </div>

              {retellReady ? (
                <button onClick={startCall}
                  className="pulse-ring relative flex h-20 w-20 items-center justify-center rounded-full bg-gold-500 text-white shadow-lg hover:bg-gold-600 transition-colors gold-glow">
                  <svg className="h-8 w-8" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M6.62 10.79a15.053 15.053 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                  </svg>
                </button>
              ) : (
                <div className="flex h-20 w-20 items-center justify-center rounded-full bg-white/5 border border-white/10 text-white/20">
                  <svg className="h-8 w-8" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M6.62 10.79a15.053 15.053 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                  </svg>
                </div>
              )}

              {!retellReady && (
                <div className="rounded-2xl border border-gold-500/20 bg-gold-500/5 px-5 py-3 text-center text-xs text-gold-400 max-w-xs">
                  Live demo activates once the Retell token endpoint is connected
                </div>
              )}

              <div className="flex items-center gap-5 text-xs text-white/25">
                <span className="flex items-center gap-1.5">
                  <svg className="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" /></svg>
                  Mic required
                </span>
                <span className="flex items-center gap-1.5">
                  <svg className="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                  Secure
                </span>
                <span className="flex items-center gap-1.5">
                  <svg className="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                  ~2 min demo
                </span>
              </div>

              <div className="w-full rounded-2xl border border-white/5 bg-white/[0.02] p-4">
                <div className="text-xs font-semibold uppercase tracking-widest text-white/20 mb-3">Try saying...</div>
                <div className="flex flex-wrap gap-2">
                  {["I've got a burst pipe", "I need a quote for hot water", "Do you service my area?", "I need to book a plumber"].map((s) => (
                    <span key={s} className="rounded-full border border-white/10 bg-white/[0.03] px-3 py-1.5 text-xs text-white/40">"{s}"</span>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* CONNECTING */}
          {callState === "connecting" && (
            <div className="flex flex-col items-center gap-5 px-6 py-14">
              <div className="relative flex h-20 w-20 items-center justify-center rounded-full bg-gold-500 text-white">
                <div className="absolute inset-0 animate-ping rounded-full bg-gold-400 opacity-25" />
                <svg className="h-8 w-8 animate-pulse" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M6.62 10.79a15.053 15.053 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                </svg>
              </div>
              <div className="text-sm font-medium text-white">Connecting...</div>
              <div className="text-xs text-white/35">Allow microphone access when prompted</div>
            </div>
          )}

          {/* ACTIVE */}
          {callState === "active" && (
            <div className="flex flex-col gap-4 p-5">
              <div className="flex items-center justify-between rounded-2xl bg-navy-700 px-4 py-3">
                <div className="flex items-center gap-3">
                  <div className="flex h-9 w-9 items-center justify-center rounded-full bg-gold-500/15 border border-gold-500/30">
                    <svg className="h-4 w-4 text-gold-400" fill="currentColor" viewBox="0 0 24 24">
                      <path d="M6.62 10.79a15.053 15.053 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                    </svg>
                  </div>
                  <div>
                    <div className="text-sm font-semibold text-white">Northside Plumbing</div>
                    <div className="text-xs text-white/35">OTW AI Receptionist</div>
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  {isSpeaking && <SoundWave />}
                  {callStartTime && <CallTimer startTime={callStartTime} />}
                </div>
              </div>

              <div className="flex items-center justify-between px-1 text-xs">
                <span className={`flex items-center gap-1.5 transition-all ${speakerRole === "assistant" ? "text-gold-400 font-medium" : "text-white/25"}`}>
                  <span className={`h-1.5 w-1.5 rounded-full ${speakerRole === "assistant" ? "bg-gold-400" : "bg-white/15"}`} />
                  Assistant speaking
                </span>
                <span className={`flex items-center gap-1.5 transition-all ${speakerRole === "user" ? "text-gold-400 font-medium" : "text-white/25"}`}>
                  You speaking
                  <span className={`h-1.5 w-1.5 rounded-full ${speakerRole === "user" ? "bg-gold-400" : "bg-white/15"}`} />
                </span>
              </div>

              <div ref={transcriptRef} className="space-y-2 rounded-2xl bg-white/[0.02] border border-white/5 p-4 overflow-y-auto" style={{ maxHeight: "200px", minHeight: "100px" }}>
                {transcript.length === 0 ? (
                  <div className="flex items-center justify-center h-14 text-sm text-white/25">Listening...</div>
                ) : transcript.map((msg) => (
                  <div key={msg.id} className={`rounded-2xl px-3 py-2.5 text-sm ${msg.role === "assistant" ? "bg-white/5 text-white/70" : "ml-auto max-w-[85%] bg-gold-500/15 text-gold-200 border border-gold-500/20"}`}>
                    <span className="text-xs font-medium opacity-60 mr-1">{msg.role === "assistant" ? "AI:" : "You:"}</span>
                    {msg.text}
                  </div>
                ))}
              </div>

              <button onClick={endCall}
                className="flex w-full items-center justify-center gap-2 rounded-2xl border border-red-500/30 bg-red-500/10 py-3 text-sm font-medium text-red-400 hover:bg-red-500/20 transition-colors">
                <svg className="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 8l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M5 3a2 2 0 00-2 2v1c0 8.284 6.716 15 15 15h1a2 2 0 002-2v-3.28a1 1 0 00-.684-.948l-4.493-1.498a1 1 0 00-1.21.502l-1.13 2.257a11.042 11.042 0 01-5.516-5.517l2.257-1.128a1 1 0 00.502-1.21L9.228 3.683A1 1 0 008.279 3H5z" /></svg>
                End call
              </button>
            </div>
          )}

          {/* ENDED */}
          {callState === "ended" && (
            <div className="flex flex-col gap-4 p-5">
              <div className="flex items-center gap-3 rounded-2xl bg-gold-500/10 border border-gold-500/20 px-4 py-3">
                <div className="flex h-8 w-8 items-center justify-center rounded-full bg-gold-500/20">
                  <svg className="h-4 w-4 text-gold-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M5 13l4 4L19 7" />
                  </svg>
                </div>
                <div>
                  <div className="text-sm font-semibold text-white">Call complete</div>
                  <div className="text-xs text-white/35">Lead captured · Team notified</div>
                </div>
              </div>

              <div className="rounded-2xl border border-white/8 bg-white/[0.03] p-4">
                <div className="text-xs font-semibold uppercase tracking-widest text-white/25 mb-3">Lead summary</div>
                {Object.entries(DEMO_LEAD).map(([k, v]) => (
                  <div key={k} className="mt-1.5 flex items-center justify-between rounded-xl bg-white/[0.04] px-3 py-2 text-xs">
                    <span className="text-white/30 capitalize">{k}</span>
                    <span className={`font-medium ${k === "urgency" ? "text-gold-400" : "text-white/70"}`}>{v}</span>
                  </div>
                ))}
              </div>

              <div className="flex gap-2">
                <a href="#audit" className="btn-gold flex-1 rounded-full bg-gold-500 py-2.5 text-center text-xs font-semibold text-white hover:bg-gold-600">
                  Book a free audit
                </a>
                <button onClick={() => { setCallState("idle"); setTranscript([]); }}
                  className="btn-ghost flex-1 rounded-full border border-white/10 py-2.5 text-xs font-medium text-white/50">
                  Try again
                </button>
              </div>
            </div>
          )}

          {/* ERROR / MIC DENIED */}
          {(callState === "error" || callState === "mic-denied") && (
