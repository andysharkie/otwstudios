<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OTW AI Receptionist — Answer every call. Capture every lead.</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Retell Web SDK -->
  <script src="https://cdn.jsdelivr.net/npm/retell-client-js-sdk@latest/dist/index.umd.js"></script>
  <style>
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.6); opacity: 0; }
    }
    @keyframes sound-wave {
      0%, 100% { height: 6px; }
      50% { height: 22px; }
    }
    .pulse-ring::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse-ring 1.2s ease-out infinite;
    }
    .sound-bar { animation: sound-wave 0.8s ease-in-out infinite; }
    .sound-bar:nth-child(2) { animation-delay: 0.1s; }
    .sound-bar:nth-child(3) { animation-delay: 0.2s; }
    .sound-bar:nth-child(4) { animation-delay: 0.3s; }
    .sound-bar:nth-child(5) { animation-delay: 0.15s; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─── RETELL CONFIG ───────────────────────────────────────────
    // RETELL_TOKEN_ENDPOINT: your backend endpoint that calls
    // Retell's POST /v2/create-web-call and returns { access_token }
    const RETELL_TOKEN_ENDPOINT = "YOUR_TOKEN_ENDPOINT"; // e.g. "/api/retell-token"
    const RETELL_AGENT_ID = "YOUR_RETELL_AGENT_ID";      // from Retell dashboard
    // ─────────────────────────────────────────────────────────────

    const DEMO_LEAD_SUMMARY = {
      caller: "Sarah Thompson",
      phone: "0412 555 018",
      suburb: "Mount Lawley",
      issue: "Burst pipe / active leak",
      urgency: "High",
      status: "Escalated to team",
      nextStep: "Team notified — priority callback",
      notify: "SMS + email alert sent to Northside Plumbing",
    };

    function SoundWave({ active }) {
      if (!active) return null;
      return (
        <div className="flex items-center gap-0.5 h-6">
          {[...Array(5)].map((_, i) => (
            <div
              key={i}
              className={`sound-bar w-1 rounded-full bg-current`}
              style={{ animationDelay: `${i * 0.1}s` }}
            />
          ))}
        </div>
      );
    }

    function CallTimer({ startTime }) {
      const [elapsed, setElapsed] = useState(0);
      useEffect(() => {
        const interval = setInterval(() => {
          setElapsed(Math.floor((Date.now() - startTime) / 1000));
        }, 1000);
        return () => clearInterval(interval);
      }, [startTime]);
      const m = Math.floor(elapsed / 60).toString().padStart(2, "0");
      const s = (elapsed % 60).toString().padStart(2, "0");
      return <span className="font-mono text-sm tabular-nums">{m}:{s}</span>;
    }

    function VoiceDemo() {
      const retellRef = useRef(null);
      const [callState, setCallState] = useState("idle");
      // idle | connecting | active | ended | mic-denied | error
      const [isSpeaking, setIsSpeaking] = useState(false);
      const [speakerRole, setSpeakerRole] = useState(null); // "assistant" | "user"
      const [transcript, setTranscript] = useState([]);
      const [callStartTime, setCallStartTime] = useState(null);
      const transcriptRef = useRef(null);

      // Initialise Retell once
      useEffect(() => {
        if (typeof RetellWebClient !== "undefined") {
          retellRef.current = new RetellWebClient();
          const r = retellRef.current;

          r.on("call_started", () => {
            setCallState("active");
            setCallStartTime(Date.now());
            setTranscript([]);
          });

          r.on("call_ended", () => {
            setCallState("ended");
            setIsSpeaking(false);
            setSpeakerRole(null);
          });

          r.on("agent_start_talking", () => {
            setIsSpeaking(true);
            setSpeakerRole("assistant");
          });

          r.on("agent_stop_talking", () => {
            setIsSpeaking(false);
            setSpeakerRole(null);
          });

          r.on("update", (update) => {
            if (update.transcript && update.transcript.length > 0) {
              const last = update.transcript[update.transcript.length - 1];
              setSpeakerRole(last.role === "agent" ? "assistant" : "user");
              setTranscript(
                update.transcript.map((msg, i) => ({
                  role: msg.role === "agent" ? "assistant" : "user",
                  text: msg.content,
                  id: i,
                }))
              );
            }
          });

          r.on("error", (err) => {
            console.error("Retell error:", err);
            const msg = err?.message || "";
            if (msg.includes("Permission denied") || msg.includes("NotAllowedError")) {
              setCallState("mic-denied");
            } else {
              setCallState("error");
            }
          });
        }
        return () => {
          if (retellRef.current) retellRef.current.stopCall();
        };
      }, []);

      // Auto-scroll transcript
      useEffect(() => {
        if (transcriptRef.current) {
          transcriptRef.current.scrollTop = transcriptRef.current.scrollHeight;
        }
      }, [transcript]);

      const startCall = useCallback(async () => {
        setCallState("connecting");
        setTranscript([]);
        try {
          // Backend must call POST /v2/create-web-call on Retell and return { access_token }
          const res = await fetch(RETELL_TOKEN_ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ agent_id: RETELL_AGENT_ID }),
          });
          if (!res.ok) throw new Error(`Token endpoint returned ${res.status}`);
          const { access_token } = await res.json();
          await retellRef.current.startCall({ accessToken: access_token, sampleRate: 24000 });
        } catch (err) {
          console.error("Retell startCall error:", err);
          setCallState("error");
        }
      }, []);

      const endCall = useCallback(() => {
        if (retellRef.current) retellRef.current.stopCall();
        setCallState("ended");
      }, []);

      const resetDemo = useCallback(() => {
        setCallState("idle");
        setTranscript([]);
        setIsSpeaking(false);
        setSpeakerRole(null);
        setCallStartTime(null);
      }, []);

      const retellReady = typeof RetellWebClient !== "undefined" && RETELL_TOKEN_ENDPOINT !== "YOUR_TOKEN_ENDPOINT";

      return (
        <div className="rounded-[2rem] border border-slate-200 bg-slate-50 p-5 shadow-sm">

          {/* ── HEADER ── */}
          <div className="mb-5 flex items-center justify-between gap-4">
            <div>
              <div className="text-sm font-semibold text-slate-900">Live voice demo</div>
              <div className="text-xs text-slate-500">
                Talk to the OTW AI Receptionist — powered by Retell + ElevenLabs
              </div>
            </div>
            <div className="flex items-center gap-2">
              {callState === "active" && (
                <div className="flex items-center gap-1.5">
                  <span className="relative flex h-2 w-2">
                    <span className="absolute inline-flex h-full w-full animate-ping rounded-full bg-green-400 opacity-75" />
                    <span className="relative inline-flex h-2 w-2 rounded-full bg-green-500" />
                  </span>
                  <span className="text-xs font-medium text-green-700">Live</span>
                </div>
              )}
              <div className="rounded-full bg-white px-3 py-1 text-xs text-slate-500 shadow-sm">
                Northside Plumbing demo
              </div>
            </div>
          </div>

          {/* ── IDLE STATE ── */}
          {callState === "idle" && (
            <div className="flex flex-col items-center gap-6 py-8">
              <div className="text-center">
                <div className="text-base font-semibold text-slate-900">
                  Call the AI Receptionist
                </div>
                <p className="mt-2 max-w-xs text-sm text-slate-500">
                  Use your microphone to have a real conversation. Try asking about a burst pipe, requesting a quote, or asking about the service area.
                </p>
              </div>

              {retellReady ? (
                <button
                  onClick={startCall}
                  className="relative flex h-20 w-20 items-center justify-center rounded-full bg-slate-900 text-white shadow-lg transition hover:bg-slate-800 active:scale-95"
                >
                  <svg className="h-8 w-8" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M6.62 10.79a15.053 15.053 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                  </svg>
                </button>
              ) : (
                <div className="rounded-2xl border border-amber-200 bg-amber-50 p-4 text-center text-sm text-amber-800 max-w-xs">
                  Live demo activates once the Retell token endpoint is connected.
                </div>
              )}

              <div className="flex items-center gap-4 text-xs text-slate-400">
                <div className="flex items-center gap-1.5">
                  <svg className="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                  </svg>
                  Microphone required
                </div>
                <div className="flex items-center gap-1.5">
                  <svg className="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                  </svg>
                  Secure connection
                </div>
                <div className="flex items-center gap-1.5">
                  <svg className="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                  </svg>
                  ~2 min demo
                </div>
              </div>

              <div className="w-full rounded-2xl border border-dashed border-slate-300 bg-white p-4">
                <div className="text-xs font-semibold uppercase tracking-wide text-slate-400 mb-2">Try saying...</div>
                <div className="flex flex-wrap gap-2">
                  {[
                    "I've got a burst pipe",
                    "I need a quote for hot water",
                    "Do you service my area?",
                    "I need to book someone in",
                  ].map((prompt) => (
                    <span key={prompt} className="rounded-full border border-slate-200 bg-slate-50 px-3 py-1 text-xs text-slate-600">
                      "{prompt}"
                    </span>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* ── CONNECTING STATE ── */}
          {callState === "connecting" && (
            <div className="flex flex-col items-center gap-4 py-10">
              <div className="relative flex h-20 w-20 items-center justify-center rounded-full bg-slate-900 text-white">
                <div className="absolute inset-0 animate-ping rounded-full bg-slate-700 opacity-30" />
                <svg className="h-8 w-8 animate-pulse" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M6.62 10.79a15.053 15.053 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                </svg>
              </div>
              <div className="text-sm font-medium text-slate-700">Connecting to AI Receptionist...</div>
              <div className="text-xs text-slate-400">Allow microphone access when prompted</div>
            </div>
          )}

          {/* ── ACTIVE CALL STATE ── */}
          {callState === "active" && (
            <div className="flex flex-col gap-4">
              {/* Call status bar */}
              <div className="flex items-center justify-between rounded-2xl bg-slate-900 px-4 py-3 text-white">
                <div className="flex items-center gap-3">
                  <div className="relative flex h-9 w-9 items-center justify-center rounded-full bg-white/10">
                    <svg className="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
                      <path d="M6.62 10.79a15.053 15.053 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                    </svg>
                  </div>
                  <div>
                    <div className="text-sm font-semibold">Northside Plumbing</div>
                    <div className="text-xs text-slate-400">OTW AI Receptionist</div>
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  {isSpeaking && <SoundWave active={true} />}
                  {callStartTime && <CallTimer startTime={callStartTime} />}
                </div>
              </div>

              {/* Speaking indicator */}
              <div className="flex items-center justify-between text-xs text-slate-500 px-1">
                <div className={`flex items-center gap-1.5 transition-opacity ${speakerRole === "assistant" ? "opacity-100 text-slate-900" : "opacity-40"}`}>
                  <span className={`h-1.5 w-1.5 rounded-full ${speakerRole === "assistant" ? "bg-slate-900" : "bg-slate-300"}`} />
                  Assistant speaking
                </div>
                <div className={`flex items-center gap-1.5 transition-opacity ${speakerRole === "user" ? "opacity-100 text-slate-900" : "opacity-40"}`}>
                  You speaking
                  <span className={`h-1.5 w-1.5 rounded-full ${speakerRole === "user" ? "bg-slate-900" : "bg-slate-300"}`} />
                </div>
              </div>

              {/* Live transcript */}
              <div
                ref={transcriptRef}
                className="space-y-2 rounded-3xl bg-white p-4 shadow-sm overflow-y-auto"
                style={{ maxHeight: "220px", minHeight: "120px" }}
              >
                {transcript.length === 0 && (
                  <div className="flex items-center justify-center h-16 text-sm text-slate-400">
                    Listening...
                  </div>
                )}
                {transcript.map((msg) => (
                  <div
                    key={msg.id}
                    className={`rounded-2xl p-3 text-sm ${
                      msg.role === "assistant"
                        ? "bg-slate-100 text-slate-700"
                        : "ml-auto max-w-[85%] bg-slate-900 text-white"
                    }`}
                  >
                    <span className="text-xs font-medium opacity-60 mr-1">
                      {msg.role === "assistant" ? "Assistant:" : "You:"}
                    </span>
                    {msg.text}
                  </div>
                ))}
              </div>

              {/* End call button */}
              <button
                onClick={endCall}
                className="flex w-full items-center justify-center gap-2 rounded-2xl bg-red-600 py-3 text-sm font-medium text-white hover:bg-red-700 transition"
              >
                <svg className="h-4 w-4" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M13.414 12l3.293-3.293a1 1 0 00-1.414-1.414L12 10.586 8.707 7.293a1 1 0 00-1.414 1.414L10.586 12l-3.293 3.293a1 1 0 101.414 1.414L12 13.414l3.293 3.293a1 1 0 001.414-1.414L13.414 12z"/>
                </svg>
                End call
              </button>
            </div>
          )}

          {/* ── CALL ENDED STATE ── */}
          {callState === "ended" && (
            <div className="flex flex-col gap-4">
              <div className="rounded-2xl bg-slate-900 px-4 py-3 text-white text-sm flex items-center gap-3">
                <div className="flex h-8 w-8 items-center justify-center rounded-full bg-white/10">
                  <svg className="h-4 w-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
                  </svg>
                </div>
                <div>
                  <div className="font-semibold">Call complete</div>
                  <div className="text-xs text-slate-400">Lead captured · Team notified</div>
                </div>
              </div>

              {/* Transcript replay (collapsed) */}
              {transcript.length > 0 && (
                <div className="space-y-2 rounded-3xl bg-white p-4 shadow-sm overflow-y-auto" style={{ maxHeight: "160px" }}>
                  <div className="text-xs font-semibold uppercase tracking-wide text-slate-400 mb-2">Call transcript</div>
                  {transcript.map((msg) => (
                    <div
                      key={msg.id}
                      className={`rounded-2xl p-3 text-sm ${
                        msg.role === "assistant"
                          ? "bg-slate-100 text-slate-700"
                          : "ml-auto max-w-[85%] bg-slate-900 text-white"
                      }`}
                    >
                      <span className="text-xs font-medium opacity-60 mr-1">
                        {msg.role === "assistant" ? "Assistant:" : "You:"}
                      </span>
                      {msg.text}
                    </div>
                  ))}
                </div>
              )}

              {/* Lead summary */}
              <div className="rounded-2xl border border-dashed border-slate-300 bg-white p-4">
                <div className="text-xs font-semibold uppercase tracking-wide text-slate-500 mb-3">
                  What your business receives
                </div>
                <div className="grid gap-2 sm:grid-cols-2">
                  {Object.entries(DEMO_LEAD_SUMMARY).filter(([k]) => k !== "notify").map(([key, value]) => (
                    <div key={key} className="flex items-center justify-between rounded-xl bg-slate-50 px-3 py-2 text-sm">
                      <span className="text-slate-500 capitalize">{key.replace(/([A-Z])/g, ' $1').toLowerCase()}</span>
                      <span className="font-medium text-slate-900 text-right ml-2">{value}</span>
                    </div>
                  ))}
                </div>
                <div className="mt-3 text-xs text-slate-400">{DEMO_LEAD_SUMMARY.notify}</div>
              </div>

              {/* CTAs */}
              <div className="grid gap-2 sm:grid-cols-2">
                <a
                  href="#pricing"
                  className="rounded-2xl bg-slate-900 px-4 py-3 text-center text-sm font-medium text-white hover:bg-slate-800"
                >
                  Book an audit
                </a>
                <button
                  onClick={resetDemo}
                  className="rounded-2xl border border-slate-300 px-4 py-3 text-sm font-medium text-slate-700 hover:bg-slate-50"
                >
                  Call again
                </button>
              </div>
            </div>
          )}

          {/* ── MIC DENIED STATE ── */}
          {callState === "mic-denied" && (
            <div className="flex flex-col items-center gap-4 py-8 text-center">
              <div className="flex h-16 w-16 items-center justify-center rounded-full border-2 border-amber-300 bg-amber-50 text-amber-600">
                <svg className="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
              </div>
              <div>
                <div className="text-sm font-semibold text-slate-900">Microphone access needed</div>
                <p className="mt-2 max-w-xs text-sm text-slate-500">
                  Allow microphone access in your browser to use the voice demo. Look for the camera/mic icon in your address bar and click "Allow".
                </p>
              </div>
              <button
                onClick={resetDemo}
                className="rounded-2xl border border-slate-300 px-5 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50"
              >
                Try again
              </button>
            </div>
          )}

          {/* ── ERROR STATE ── */}
          {callState === "error" && (
            <div className="flex flex-col items-center gap-4 py-8 text-center">
              <div className="flex h-16 w-16 items-center justify-center rounded-full border-2 border-red-200 bg-red-50 text-red-500">
                <svg className="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
              </div>
              <div>
                <div className="text-sm font-semibold text-slate-900">Connection failed</div>
                <p className="mt-2 max-w-xs text-sm text-slate-500">
                  Couldn't connect to the demo assistant. This usually means the Retell token endpoint isn't configured yet.
                </p>
              </div>
              <button
                onClick={resetDemo}
                className="rounded-2xl border border-slate-300 px-5 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50"
              >
                Try again
              </button>
            </div>
          )}
        </div>
      );
    }

    // ─── MAIN PAGE ────────────────────────────────────────────────

    function OTWAIReceptionistWebsite() {
      const useCases = [
        { title: "Plumbers", pain: "Urgent call-outs, leaks, blocked drains, quote requests.", outcome: "Triage urgent jobs, capture lead details, and keep the day moving." },
        { title: "Electricians", pain: "Site work, emergency faults, booking enquiries.", outcome: "Reduce interruptions while urgent jobs are routed properly." },
        { title: "Carpenters", pain: "Quote calls, scheduling, follow-up delays.", outcome: "Capture qualified leads and keep callbacks organised." },
        { title: "Service Businesses", pain: "Small teams lose leads when everyone is busy.", outcome: "Answer more calls without hiring a full-time receptionist." },
      ];

      const features = [
        "Answers inbound calls professionally",
        "Captures and qualifies leads",
        "Answers approved FAQs",
        "Routes urgent jobs properly",
        "Sends confirmations and notifications",
        "Books appointments on higher-tier plans",
      ];

      const faqs = [
        { q: "How does this work for my business?", a: "We configure the assistant around your services, service area, urgency rules, FAQs, and handoff preferences. OTW handles setup with you rather than leaving you to figure it out alone." },
        { q: "Will it sound robotic?", a: "Try the live demo above — the voice is powered by ElevenLabs, which produces some of the most natural-sounding AI speech available. We configure the tone around your brand." },
        { q: "Can it book jobs for me?", a: "Yes, on higher-tier plans where booking rules and calendar access are configured. Tier 1 can still capture, qualify, and notify without direct booking." },
        { q: "What if a caller has an urgent issue?", a: "Urgent scenarios are routed based on your business rules, including live call transfer, escalation, or priority notification to your phone." },
        { q: "Do I have to set this up myself?", a: "No. That's the point. It's set up for you, not by you." },
      ];

      const pricing = [
        {
          name: "Essentials",
          bestFor: "Lead capture and fewer missed opportunities",
          items: ["Answer inbound calls", "Capture and qualify leads", "Answer approved FAQs", "Send confirmations", "Notify your business", "Transfer specific calls when needed"],
          cta: "Book an audit",
          highlight: false,
        },
        {
