<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OTW Studios — Workflow automation for service businesses</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { 950:'#04080F', 900:'#0A0F1E', 800:'#0F1629', 700:'#172035' },
            gold: { 300:'#FDE68A', 400:'#FCD34D', 500:'#F59E0B', 600:'#D97706', 700:'#B45309' }
          },
          fontFamily: { sans: ['Inter','system-ui','sans-serif'] }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    html { scroll-behavior: smooth; }
    .gold-glow { box-shadow: 0 0 40px rgba(245,158,11,0.18); }
    .card-dark { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); transition: all 0.2s; }
    .card-dark:hover { background: rgba(255,255,255,0.07); border-color: rgba(245,158,11,0.3); }

    /* Flowchart animations */
    @keyframes drawLine { from { stroke-dashoffset: 1; } to { stroke-dashoffset: 0; } }
    @keyframes fadeNode { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes pulseDot { 0%,100% { r: 4; opacity:1; } 50% { r: 6; opacity:0.7; } }
    @keyframes pulseRingScale { 0%,100% { transform:scale(1); opacity:0.18; } 50% { transform:scale(1.07); opacity:0.06; } }
    .section-fade { background: linear-gradient(180deg, #f8fafc 0%, #0A0F1E 100%); height: 100px; margin-top: -1px; }
    input:focus, textarea:focus { outline: none; }
    /* ── Products mega-menu dropdown (sophiie.ai-inspired) ── */
    .prod-dropdown { position: relative; }
    .prod-menu {
      visibility: hidden; opacity: 0;
      transform: translateX(-50%) translateY(8px);
      transition: opacity 0.18s ease, transform 0.18s ease, visibility 0s 0.18s;
      position: absolute; top: calc(100% + 14px); left: 50%;
      z-index: 60; min-width: 480px;
    }
    .prod-dropdown:hover .prod-menu {
      visibility: visible; opacity: 1;
      transform: translateX(-50%) translateY(0);
      transition: opacity 0.18s ease, transform 0.18s ease, visibility 0s;
    }
    .prod-panel {
      background: #fff; border-radius: 20px;
      box-shadow: 0 4px 6px -4px rgba(0,0,0,0.22), 0 10px 15px -3px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.06);
      padding: 18px;
    }
    .prod-slabel { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.12em; color:#94a3b8; padding:0 10px 8px; }
    .prod-item { display:flex; align-items:flex-start; gap:11px; padding:10px; border-radius:10px; text-decoration:none; transition:background 0.15s ease; color:inherit; }
    .prod-item:hover { background:#f9fafb; }
    .prod-icon-box { flex-shrink:0; display:flex; align-items:center; justify-content:center; width:40px; height:40px; border:1px solid #e5e7eb; border-radius:10px; box-shadow:inset 0 -2px 2px rgba(0,0,0,0.05); color:#64748b; background:#fff; }
    .prod-icon-sm { width:32px; height:32px; border-radius:8px; }
    .prod-title { font-size:13px; font-weight:600; color:#1e293b; line-height:1.3; }
    .prod-desc  { font-size:11.5px; color:#94a3b8; line-height:1.4; margin-top:2px; }
    .prod-badge { display:inline-block; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; padding:2px 7px; border-radius:20px; margin-top:4px; }
    .prod-badge-live { background:#ecfdf5; color:#059669; }
    .prod-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:3px; }
    .prod-grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:3px; }
    .prod-divider { border-top:1px solid #f1f5f9; margin:12px 0 10px; }
    /* ── Tech stack marquee (GSAP velocity-driven) ── */
    .marquee-track { display:flex; width:max-content; will-change:transform; }
    /* ── Tech stack chips (matching receptionist page style) ── */
    .stack-chip { display:inline-flex; align-items:center; gap:10px; flex-shrink:0; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.09); border-radius:12px; padding:10px 16px; white-space:nowrap; }
    .stack-chip:hover { background:rgba(255,255,255,0.08); border-color:rgba(245,158,11,0.3); }
    .stack-tag { font-size:11px; color:rgba(255,255,255,0.35); font-weight:400; padding-left:8px; border-left:1px solid rgba(255,255,255,0.12); }
    /* ── Floating badge animations ── */
    @keyframes float    { 0%,100%{transform:translateY(0)}    50%{transform:translateY(-14px)} }
    @keyframes floatAlt { 0%,100%{transform:translateY(-8px)} 50%{transform:translateY(6px)}  }
    @keyframes floatSlow{ 0%,100%{transform:translateY(0)}    50%{transform:translateY(-10px)} }
    .float-a  { animation: float     5.2s ease-in-out infinite; }
    .float-b  { animation: floatAlt  4.0s ease-in-out 0.8s infinite; }
    .float-c  { animation: floatSlow 6.4s ease-in-out 1.6s infinite; }
    /* ── Ecosystem pipeline animation ── */
    @keyframes pipeIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
    .pipe-row-in { animation: pipeIn 0.35s ease forwards; }
    /* ── GSAP scroll reveal ── */
    .gsap-reveal { opacity:0; transform:translateY(40px); }
    .gsap-hero-el { opacity:0; transform:translateY(30px); }
  </style>
</head>
<body class="bg-white text-slate-900 antialiased">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const s = { fill:'none', stroke:'currentColor', strokeWidth:'1.5', strokeLinecap:'round', strokeLinejoin:'round' };

function IndIcon({ type }) {
  const icons = {
    plumbing:    <svg width="22" height="22" viewBox="0 0 24 24" {...s}><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>,
    electrical:  <svg width="22" height="22" viewBox="0 0 24 24" {...s}><polygon points="13,2 3,14 12,14 11,22 21,10 12,10"/></svg>,
    hvac:        <svg width="22" height="22" viewBox="0 0 24 24" {...s}><path d="M9.59 4.59A2 2 0 1011 8H2m10.59 11.41A2 2 0 1014 16H2m15.73-8.27A2.5 2.5 0 1119.5 12H2"/></svg>,
    carpentry:   <svg width="22" height="22" viewBox="0 0 24 24" {...s}><path d="M3 21l9-9m4.5-9.5l-2 2 5 5 2-2a3.536 3.536 0 00-5-5z"/><path d="M9.5 14.5L4 20"/></svg>,
    landscaping: <svg width="22" height="22" viewBox="0 0 24 24" {...s}><path d="M12 22V12"/><path d="M12 12C12 7 7 4 2 4c0 5 3 8 10 8z"/><path d="M12 12c0-5 5-8 10-8 0 5-3 8-10 8z"/></svg>,
    cleaning:    <svg width="22" height="22" viewBox="0 0 24 24" {...s}><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3z"/><path d="M5 19l2-2m7 3l-2-2M19 5l-2 2"/></svg>,
    pest:        <svg width="22" height="22" viewBox="0 0 24 24" {...s}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>,
    auto:        <svg width="22" height="22" viewBox="0 0 24 24" {...s}><path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v9a2 2 0 01-2 2h-2"/><circle cx="9" cy="17" r="2"/><circle cx="17" cy="17" r="2"/><path d="M9 7h6l1 3H8l1-3z"/></svg>,
  };
  return icons[type] || null;
}

const products = [
  {
    status:'live', badge:'Available now',
    name:'OTW Receptionist',
    tagline:'Answer every call. Capture every lead.',
    description:'A fully managed AI phone receptionist configured around your business — your services, service area, and urgency rules. Answers calls, qualifies leads, handles FAQs, and routes every next step while your team stays on the job.',
    highlight: true,
    href:'otw_ai_receptionist.html',
  },
  {
    status:'live', badge:'Available now',
    name:'OTW TriageAI',
    tagline:'Sort every email. Draft replies in your voice.',
    description:'A fully managed email triage system that reads, categorises, and drafts replies to every inbound message. Urgent jobs get flagged. Quotes get tracked. Admin gets handled — without you touching the inbox.',
    highlight: false,
    href:'otw_triageai.html',
  },
  {
    status:'coming', badge:'Coming soon',
    name:'OTW Scheduling',
    tagline:'Book jobs without the back-and-forth.',
    description:'Automated scheduling that works around your team\'s availability, job types, and service area. Keep your calendar full without constant interruptions.',
    highlight: false,
    href:'otw_scheduling.html',
  },
  {
    status:'coming', badge:'Coming soon',
    name:'OTW ReviewGenius',
    tagline:'Turn completed jobs into 5-star reviews.',
    description:'After every job, automatically sends a personalised review request. Happy customers go to Google. Unhappy ones are caught privately. AI drafts responses to every review.',
    highlight: false,
    href:'otw_reviewgenius.html',
  },
  {
    status:'coming', badge:'Coming soon',
    name:'OTW DebtCollector',
    tagline:'Stop chasing. Start getting paid.',
    description:'Connects to Xero or MYOB and runs a structured follow-up sequence on every overdue invoice — from friendly reminder to final notice — in your voice.',
    highlight: false,
    href:'otw_debtcollector.html',
  },
];

const industries = [
  { name:'Plumbing',     iconType:'plumbing',    live:true  },
  { name:'Electrical',   iconType:'electrical',  live:true  },
  { name:'HVAC',         iconType:'hvac',        live:true  },
  { name:'Carpentry',    iconType:'carpentry',   live:true  },
  { name:'Landscaping',  iconType:'landscaping', live:false },
  { name:'Cleaning',     iconType:'cleaning',    live:false },
  { name:'Pest Control', iconType:'pest',        live:false },
  { name:'Auto Services',iconType:'auto',        live:false },
];

const stats = [
  { value:'24/7',   label:'Inbound call coverage' },
  { value:'48 hrs', label:'From sale to live' },
  { value:'< 90s',  label:'Emergency escalation' },
  { value:'0',      label:'Tech skills required' },
];

// ── WORKFLOW FLOWCHART ───────────────────────────────
function WorkflowChart() {
  const [animStep, setAnimStep] = useState(0);
  const [selectedId, setSelectedId] = useState(null);
  const [svgKey, setSvgKey] = useState(0);
  const containerRef = useRef(null);
  const timersRef = useRef([]);

  // ms from animation start when each step activates
  const TIMING = [500, 1700, 2900, 4200, 5400, 6400];

  function startAnimation() {
    timersRef.current.forEach(clearTimeout);
    timersRef.current = [];
    setAnimStep(0);
    setSelectedId(null);
    setSvgKey(k => k + 1);
    TIMING.forEach((ms, i) => {
      const t = setTimeout(() => setAnimStep(i + 1), ms);
      timersRef.current.push(t);
    });
  }

  useEffect(() => {
    const observer = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) startAnimation(); },
      { threshold: 0.25 }
    );
    if (containerRef.current) observer.observe(containerRef.current);
    return () => {
      observer.disconnect();
      timersRef.current.forEach(clearTimeout);
    };
  }, []);

  // ── Node definitions ─────────────────────────────────────────────
  // step: when this node activates in the sequence
  // type: customer | product | product-hero | outcome
  const NODES = {
    cust_call:   { step:1, cx:65,  cy:130, r:42, type:'customer',     label:['Phone','Call'],      icon:'📞' },
    cust_email:  { step:1, cx:65,  cy:305, r:42, type:'customer',     label:['Email','Enquiry'],   icon:'📧' },
    receptionist:{ step:2, cx:238, cy:130, w:148, h:60, type:'product',     label:'AI Receptionist', sub:'FAQ · Quotes · Lead capture', href:'otw_ai_receptionist.html', live:true },
    triageai:    { step:3, cx:228, cy:305, w:128, h:60, type:'product',     label:'OTW TriageAI',    sub:'Draft · Categorise · Log',    href:'otw_triageai.html',         live:true },
    scheduling:  { step:4, cx:460, cy:218, w:172, h:74, type:'product-hero',label:'OTW Scheduling',  sub:'The automation hub',          href:'otw_scheduling.html',       live:false },
    debt:        { step:5, cx:675, cy:130, w:148, h:60, type:'product',     label:'DebtCollector',   sub:'Invoice follow-up',           href:'otw_debtcollector.html',    live:false },
    review:      { step:5, cx:675, cy:305, w:148, h:60, type:'product',     label:'ReviewGenius',    sub:'5-star requests',             href:'otw_reviewgenius.html',     live:false },
    out_paid:    { step:6, cx:808, cy:130, r:36, type:'outcome',      label:['Invoice','Paid'],    icon:'💰' },
    out_review:  { step:6, cx:808, cy:305, r:36, type:'outcome',      label:['5-Star','Review'],   icon:'⭐' },
  };

  // Edge helpers for rects
  function rLeft(n)  { return n.cx - n.w/2; }
  function rRight(n) { return n.cx + n.w/2; }

  const R = NODES;
  // ── Path definitions ─────────────────────────────────────────────
  const PATHS = [
    { id:'p1', step:2, fromStep:1, d:`M 107 130 L ${rLeft(R.receptionist)} 130`,           dotBegin:'1.0s', dotDur:'0.55s' },
    { id:'p2', step:3, fromStep:1, d:`M 107 305 L ${rLeft(R.triageai)} 305`,               dotBegin:'2.2s', dotDur:'0.55s' },
    { id:'p3', step:4, fromStep:2, d:`M ${rRight(R.receptionist)} 130 L ${R.scheduling.cx-20} 130 Q ${R.scheduling.cx} 130 ${R.scheduling.cx} 150 L ${R.scheduling.cx} ${R.scheduling.cy-R.scheduling.h/2}`, dotBegin:'3.4s', dotDur:'0.75s' },
    { id:'p4', step:4, fromStep:3, d:`M ${rRight(R.triageai)} 305 L ${R.scheduling.cx-20} 305 Q ${R.scheduling.cx} 305 ${R.scheduling.cx} 285 L ${R.scheduling.cx} ${R.scheduling.cy+R.scheduling.h/2}`, dotBegin:'3.4s', dotDur:'0.75s' },
    { id:'p5', step:5, fromStep:4, d:`M ${rRight(R.scheduling)} ${R.scheduling.cy} Q ${rRight(R.scheduling)+20} ${R.scheduling.cy} ${rRight(R.scheduling)+20} ${R.scheduling.cy-20} L ${rRight(R.scheduling)+20} ${R.debt.cy+20} Q ${rRight(R.scheduling)+20} ${R.debt.cy} ${rRight(R.scheduling)+40} ${R.debt.cy} L ${rLeft(R.debt)} ${R.debt.cy}`, dotBegin:'4.6s', dotDur:'0.75s' },
    { id:'p6', step:5, fromStep:4, d:`M ${rRight(R.scheduling)} ${R.scheduling.cy} Q ${rRight(R.scheduling)+20} ${R.scheduling.cy} ${rRight(R.scheduling)+20} ${R.scheduling.cy+20} L ${rRight(R.scheduling)+20} ${R.review.cy-20} Q ${rRight(R.scheduling)+20} ${R.review.cy} ${rRight(R.scheduling)+40} ${R.review.cy} L ${rLeft(R.review)} ${R.review.cy}`, dotBegin:'4.6s', dotDur:'0.75s' },
    { id:'p7', step:6, fromStep:5, d:`M ${rRight(R.debt)} 130 L 772 130`,                  dotBegin:'5.7s', dotDur:'0.4s' },
    { id:'p8', step:6, fromStep:5, d:`M ${rRight(R.review)} 305 L 772 305`,                dotBegin:'5.7s', dotDur:'0.4s' },
  ];

  // ── Active step (auto-play OR selected node) ──────────────────────
  const selStep    = selectedId ? (NODES[selectedId]?.step ?? animStep) : animStep;
  const isLit      = step => step <= selStep;
  const isDimmed   = step => selectedId !== null && step > selStep;

  function nodeOpacity(step) {
    if (!isLit(step)) return 0;
    return isDimmed(step) ? 0.2 : 1;
  }
  function pathOpacity(step) {
    if (!isLit(step)) return 0;
    return isDimmed(step) ? 0.12 : 1;
  }

  // Stroke color for paths
  function pathStroke(step) {
    if (!isLit(step)) return 'rgba(255,255,255,0.1)';
    if (isDimmed(step)) return 'rgba(255,255,255,0.15)';
    return '#F59E0B';
  }

  function productFill(id, step) {
    if (!isLit(step) || isDimmed(step)) return 'rgba(255,255,255,0.04)';
    return NODES[id]?.type === 'product-hero' ? 'rgba(245,158,11,0.18)' : 'rgba(245,158,11,0.10)';
  }
  function productStroke(id, step) {
    if (!isLit(step) || isDimmed(step)) return 'rgba(255,255,255,0.10)';
    return NODES[id]?.type === 'product-hero' ? 'rgba(245,158,11,0.85)' : 'rgba(245,158,11,0.50)';
  }

  function handleNodeClick(id) {
    setSelectedId(prev => prev === id ? null : id);
    timersRef.current.forEach(clearTimeout); // pause auto-play when user interacts
  }

  const F = { fontFamily:'Inter,sans-serif' };
  const GOLD = '#F59E0B';

  return (
    <div ref={containerRef} style={{ width:'100%' }}>
      {/* ── DESKTOP (md+): animated SVG chart ─── */}
      <div className="hidden md:block">
      {/* Column labels */}
      <div style={{ display:'flex', justifyContent:'space-between', paddingBottom:14, paddingLeft:14, paddingRight:14, userSelect:'none' }}>
        {[['YOUR CUSTOMER','rgba(255,255,255,0.3)'],['OTW ECOSYSTEM','#F59E0B'],['OUTCOME','rgba(255,255,255,0.3)']].map(([label, color]) => (
          <span key={label} style={{ fontSize:10, fontWeight:800, letterSpacing:'2px', color, ...F }}>{label}</span>
        ))}
      </div>

      <svg key={svgKey} viewBox="0 0 858 440" style={{ width:'100%', height:'auto', overflow:'visible' }}>
        <defs>
          <filter id="glow-gold-jrn" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="glow-hero" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          {PATHS.map(p => <path key={`def-${p.id}`} id={p.id} d={p.d}/>)}
        </defs>

        {/* ── PATHS ── drawn behind everything ─────────────────── */}
        {PATHS.map(path => (
          <g key={path.id}>
            {/* Ghost track */}
            <path d={path.d} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="1.5" strokeLinecap="round"/>
            {/* Live path */}
            <path
              d={path.d} fill="none"
              stroke={pathStroke(path.step)}
              strokeWidth={path.step === 4 ? 2 : 1.8}
              strokeLinecap="round"
              pathLength="1"
              style={{
                strokeDasharray: 1,
                strokeDashoffset: isLit(path.step) ? 0 : 1,
                transition: 'stroke-dashoffset 0.75s ease, opacity 0.35s',
                opacity: pathOpacity(path.step),
              }}
            />
            {/* Traveling dot — only during auto-play (no selectedId) */}
            {!selectedId && (
              <circle r="5.5" fill={GOLD} opacity="0">
                <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.85;1"
                  dur={path.dotDur} begin={path.dotBegin} fill="remove"/>
                <animateMotion dur={path.dotDur} begin={path.dotBegin} fill="remove">
                  <mpath href={`#${path.id}`}/>
                </animateMotion>
              </circle>
            )}
          </g>
        ))}

        {/* ── CUSTOMER CIRCLES ─────────────────────────────────── */}
        {['cust_call','cust_email'].map(id => {
          const n = NODES[id];
          const lit = isLit(n.step);
          const op = nodeOpacity(n.step);
          return (
            <g key={id} style={{ opacity: op, transition:'opacity 0.5s' }}>
              <circle cx={n.cx} cy={n.cy} r={n.r}
                fill="rgba(255,255,255,0.05)" stroke={lit && !isDimmed(n.step) ? 'rgba(255,255,255,0.35)' : 'rgba(255,255,255,0.10)'}
                strokeWidth="1.5"/>
              <text x={n.cx} y={n.cy - 10} textAnchor="middle"
                style={{ fontSize:18, ...F }}>{n.icon}</text>
              <text x={n.cx} y={n.cy + 7} textAnchor="middle"
                style={{ fontSize:9, fontWeight:700, fill:'rgba(255,255,255,0.7)', letterSpacing:'0.3px', ...F }}>
                {n.label[0]}
              </text>
              <text x={n.cx} y={n.cy + 18} textAnchor="middle"
                style={{ fontSize:9, fontWeight:700, fill:'rgba(255,255,255,0.7)', ...F }}>
                {n.label[1]}
              </text>
            </g>
          );
        })}

        {/* ── PRODUCT NODES ────────────────────────────────────── */}
        {['receptionist','triageai','scheduling','debt','review'].map(id => {
          const n = NODES[id];
          const lit = isLit(n.step);
          const dimmed = isDimmed(n.step);
          const isHero = n.type === 'product-hero';
          const op = nodeOpacity(n.step);
          const x = n.cx - n.w/2, y = n.cy - n.h/2;

          return (
            <g key={id}
              style={{
                cursor: lit ? 'pointer' : 'default',
                opacity: op,
                transition: 'opacity 0.5s',
                filter: lit && !dimmed && selectedId === id ? 'url(#glow-gold-jrn)' : (isHero && lit && !dimmed ? 'url(#glow-hero)' : 'none'),
              }}
              onClick={() => lit && handleNodeClick(id)}
            >
              {/* Hero ring */}
              {isHero && lit && !dimmed && (
                <rect x={x - 5} y={y - 5} width={n.w + 10} height={n.h + 10} rx={18}
                  fill="none" stroke="rgba(245,158,11,0.25)" strokeWidth="1.5"
                  style={{ animation:'pulseRingScale 3s ease-in-out infinite' }}/>
              )}
              {/* Card */}

  useEffect(() => {
    const onScroll = () => {
      const b = heroRef.current ? heroRef.current.getBoundingClientRect().bottom : 300;
      setScrolled(b < 60);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  // ── GSAP animations ──────────────────────────────────────
  useEffect(() => {
    if (typeof gsap === 'undefined') return;
    gsap.registerPlugin(ScrollTrigger);

    // Hero stagger entrance
    const heroEls = gsap.utils.toArray('.gsap-hero-el');
    if (heroEls.length) {
      gsap.to(heroEls, {
        opacity: 1, y: 0, stagger: 0.11, duration: 0.85,
        ease: 'power3.out', delay: 0.08,
      });
    }

    // ScrollTrigger batch reveals
    ScrollTrigger.batch('.gsap-reveal', {
      onEnter: els => gsap.to(els, {
        opacity: 1, y: 0, stagger: 0.09, duration: 0.72,
        ease: 'power2.out', overwrite: 'auto',
      }),
      start: 'top 88%',
      once: true,
    });

    // Floating badges — override CSS with GSAP for cleaner control
    gsap.to('.float-a', { y: -10, duration: 5.2, repeat: -1, yoyo: true, ease: 'sine.inOut' });
    gsap.to('.float-b', { y:   6, duration: 4.0, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 0.8 });
    gsap.to('.float-c', { y:  -6, duration: 6.4, repeat: -1, yoyo: true, ease: 'sine.inOut', delay: 1.6 });

    // Scroll-velocity–driven marquee
    const track = document.getElementById('marquee-track');
    if (track) {
      // Wait one frame so layout is complete
      requestAnimationFrame(() => {
        const halfW = track.scrollWidth / 2;
        let pos = 0;
        const tickFn = () => {
          const vel = ScrollTrigger.getVelocity() || 0;
          // base drift left: -0.9px/frame; scroll adds velocity-scaled delta
          pos += -0.9 - vel * 0.016;
          if (pos < -halfW) pos += halfW;
          if (pos > 0)      pos -= halfW;
          gsap.set(track, { x: pos });
        };
        gsap.ticker.add(tickFn);
        // Cleanup
        track._otwTicker = tickFn;
      });
    }

    return () => {
      ScrollTrigger.getAll().forEach(t => t.kill());
      const track = document.getElementById('marquee-track');
      if (track && track._otwTicker) gsap.ticker.remove(track._otwTicker);

                    </svg>
                    andy@otwstudios.com.au
                  </div>
                  <div className="flex items-center gap-3 text-sm text-white/50">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
                      <circle cx="12" cy="10" r="3"/>
                    </svg>
                    Melbourne, VIC · Serving Australia-wide
                  </div>
                </div>
              </div>

              <div className="flex-1 max-w-xl">
                {sent ? (
                  <div className="rounded-3xl border border-gold-500/30 bg-gold-500/5 p-10 text-center">
                    <svg className="mx-auto h-8 w-8 text-gold-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <polyline points="20,6 9,17 4,12"/>
                    </svg>
                    <div className="mt-3 text-base font-semibold text-white">Message sent</div>
                    <p className="mt-2 text-sm text-white/40">Andy will get back to you shortly.</p>
                  </div>
                ) : (
                  <form onSubmit={handleContact} className="rounded-3xl border border-white/10 bg-white/[0.03] p-7 space-y-4">
                    <div>
                      <label className="block text-xs font-semibold uppercase tracking-wider text-white/40 mb-2">Your name</label>
                      <input type="text" required value={form.name}
                        onChange={e => setForm({...form, name: e.target.value})}
                        placeholder="Dave Morrison"
                        className="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white placeholder-white/25 focus:border-gold-500/50 focus:ring-1 focus:ring-gold-500/30 transition-all"/>
                    </div>
                    <div>
                      <label className="block text-xs font-semibold uppercase tracking-wider text-white/40 mb-2">Email address</label>
                      <input type="email" required value={form.email}
                        onChange={e => setForm({...form, email: e.target.value})}
                        placeholder="dave@morrisonplumbing.com.au"
                        className="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white placeholder-white/25 focus:border-gold-500/50 focus:ring-1 focus:ring-gold-500/30 transition-all"/>
                    </div>
                    <div>
                      <label className="block text-xs font-semibold uppercase tracking-wider text-white/40 mb-2">Message</label>
                      <textarea required rows={4} value={form.message}
                        onChange={e => setForm({...form, message: e.target.value})}
                        placeholder="Tell us a bit about your business and what you're looking for..."
                        className="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white placeholder-white/25 focus:border-gold-500/50 focus:ring-1 focus:ring-gold-500/30 transition-all resize-none"/>
                    </div>
                    <button type="submit"
                      className="w-full rounded-full bg-gold-500 py-3 text-sm font-semibold text-white hover:bg-gold-600 transition-colors">
                      Send message
                    </button>
                    <p className="text-center text-xs text-white/25">Or skip straight to the <a href="otw_audit.html" className="text-gold-500 hover:text-gold-400 underline underline-offset-2">free audit</a></p>
                  </form>
                )}
              </div>
            </div>
          </div>
        </section>

        {/* ── FINAL CTA ───────────────────────────────────── */}
        <section className="bg-navy-950 py-24 border-t border-white/5">
          <div className="mx-auto max-w-7xl px-6">
            <div className="flex flex-col gap-10 lg:flex-row lg:items-center lg:justify-between">
              <div className="max-w-2xl">
                <p className="text-xs font-bold uppercase tracking-widest text-gold-500">Start here</p>
                <h2 className="mt-3 text-3xl font-bold tracking-tight text-white sm:text-4xl">
                  The audit is free. Setup takes 48 hours.
                </h2>
                <p className="mt-4 text-base leading-7 text-white/50">
                  Fill in the audit and find out exactly where your business is losing money to workflow problems. No obligation. No tech knowledge required.
                </p>
              </div>
              <div className="shrink-0">
                <a href="otw_audit.html"
                  className="inline-block rounded-full bg-gold-500 px-10 py-4 text-center text-base font-semibold text-white hover:bg-gold-600 transition-colors gold-glow">
                  Start your free audit
                </a>
              </div>
            </div>
          </div>
        </section>
      </main>

      {/* ── FOOTER ──────────────────────────────────────── */}
      <footer className="bg-navy-950 border-t border-white/5 py-12">
        <div className="mx-auto max-w-7xl px-6">
          <div className="flex flex-col gap-10 md:flex-row md:justify-between">
            <div>
              <div className="text-base font-bold text-white">OTW Studios</div>
              <div className="mt-0.5 text-xs uppercase tracking-widest text-white/30">Optimise The Workflow</div>
              <p className="mt-4 max-w-xs text-sm leading-6 text-white/30">
                Managed AI workflow tools for service businesses. Set up for you, not by you.
              </p>
            </div>
            <div className="grid gap-8 text-sm sm:grid-cols-3">
              {[
                { heading:'Products', links:[['otw_ai_receptionist.html','OTW Receptionist'],['otw_triageai.html','OTW TriageAI'],['#products','OTW Scheduling'],['#products','OTW ReviewGenius'],['#products','OTW DebtCollector']] },
                { heading:'Company',  links:[['#about','About'],['#how-it-works','How it works'],['#industries','Industries'],['#contact','Contact']] },
                { heading:'Get started', links:[['otw_audit.html','Start free audit'],['otw_ai_receptionist.html#demo','Try the demo']] },
              ].map(col => (
                <div key={col.heading}>
                  <div className="font-semibold text-white/60">{col.heading}</div>
                  <ul className="mt-3 space-y-2">
                    {col.links.map(([href,label]) => (
                      <li key={label}><a href={href} className="text-white/30 hover:text-white/70 transition-colors">{label}</a></li>
                    ))}
                  </ul>
                </div>
              ))}
            </div>
          </div>
          <div className="mt-10 flex flex-col gap-2 border-t border-white/5 pt-6 text-xs text-white/20 sm:flex-row sm:justify-between">
            <span>© {new Date().getFullYear()} Andy Ngo t/as OTW Studios. All rights reserved.</span>
            <div className="flex gap-5">
              <a href="otw_privacy.html" className="hover:text-white/40 transition-colors underline underline-offset-2">Privacy Policy</a>
              <span>ABN registered · Melbourne, VIC</span>
            </div>
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
